<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AK Balkan | Prijava</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --dark-bg: #061f3a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: var(--white); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-container { width: 100%; max-width: 400px; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid rgba(197, 160, 89, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .logo-area h1 { color: var(--gold); margin: 0; font-size: 1.8rem; letter-spacing: 2px; }
        .lang-bar { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .lang-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        label { display: block; font-size: 0.8rem; text-align: left; margin-bottom: 5px; color: #aaa; margin-top: 15px; }
        input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #333; background: #1a2a3a; color: white; box-sizing: border-box; font-size: 1.1rem; }
        input:focus { border-color: var(--gold); outline: none; }
        button#btn-login { width: 100%; padding: 15px; background: var(--gold); color: var(--akb-blue); border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .footer-link { margin-top: 20px; font-size: 0.9rem; color: #aaa; }
        .footer-link a { color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-area">
        <h1>AK BALKAN</h1>
        <p id="sub-title">Prijava članova</p>
    </div>

    <div class="lang-bar">
        <button class="lang-btn" onclick="setLanguage('sr')">SRB</button>
        <button class="lang-btn" onclick="setLanguage('de')">DE</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('fr')">FR</button>
        <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
    </div>

    <div>
        <label id="lbl-num">Članski broj (Kundennummer)</label>
        <input type="number" id="login-num" placeholder="100001">
        
        <label id="lbl-pw">Lozinka (Passwort)</label>
        <input type="password" id="login-pw" placeholder="******">
    </div>

    <button id="btn-login" onclick="handleLogin()">Prijavi se</button>

    <div class="footer-link">
        <span id="txt-footer">Niste još član?</span> <a href="register.html" id="link-reg">Registracija</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const trans = {
        sr: { sub: "Prijava članova", num: "Članski broj", pw: "Lozinka", btn: "Prijavi se", foot: "Niste još član?", reg: "Registracija" },
        de: { sub: "Mitglieder-Login", num: "Kundennummer", pw: "Passwort", btn: "Einloggen", foot: "Noch kein Mitglied?", reg: "Registrierung" },
        en: { sub: "Member Login", num: "Customer Number", pw: "Password", btn: "Login", foot: "Not a member yet?", reg: "Register" },
        fr: { sub: "Connexion membre", num: "Numéro de client", pw: "Mot de passe", btn: "Se connecter", foot: "Pas encore membre ?", reg: "Inscription" },
        ru: { sub: "Вход для членов", num: "Номер клиента", pw: "Пароль", btn: "Войти", foot: "Еще nicht член?", reg: "Регистрация" }
    };

    window.setLanguage = (l) => {
        const t = trans[l];
        document.getElementById('sub-title').innerText = t.sub;
        document.getElementById('lbl-num').innerText = t.num;
        document.getElementById('lbl-pw').innerText = t.pw;
        document.getElementById('btn-login').innerText = t.btn;
        document.getElementById('txt-footer').innerText = t.foot;
        document.getElementById('link-reg').innerText = t.reg;
    };

    window.handleLogin = async () => {
        const num = document.getElementById('login-num').value;
        const pw = document.getElementById('login-pw').value;

        if(!num || !pw) return alert("Popunite sva polja!");

        // Wir wandeln die Kundennummer intern wieder in die E-Mail um
        const email = `${num}@ak-balkan.com`;

        try {
            await signInWithEmailAndPassword(auth, email, pw);
            window.location.href = "user.html"; // Weiterleitung zum Profil
        } catch (e) {
            alert("Greška: Proverite broj i lozinku.");
        }
    };
</script>
</body>
</html>
