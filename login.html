<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Balkan | Prijava</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Spezifisches Design für die dunkle Login-Karte */
        body { background: #061f3a; display: flex; align-items: center; min-height: 100vh; color: white; }
        .auth-container { 
            width: 100%; max-width: 400px; margin: auto;
            background: rgba(255,255,255,0.05); padding: 30px; 
            border-radius: 15px; border: 1px solid rgba(197, 160, 89, 0.3); 
            text-align: center; 
        }
        h1 { color: #c5a059; letter-spacing: 2px; }
        input { background: #1a2a3a; color: white; border: 1px solid #333; margin-bottom: 15px; }
        label { display: block; text-align: left; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-area">
        <h1>AK BALKAN</h1>
        <p id="sub-title" style="color: #c5a059;">Prijava članova</p>
    </div>

    <div class="lang-nav">
        <button class="l-btn active" onclick="setLanguage('sr', this)">SRB</button>
        <button class="l-btn" onclick="setLanguage('de', this)">DE</button>
        <button class="l-btn" onclick="setLanguage('en', this)">EN</button>
        <button class="l-btn" onclick="setLanguage('fr', this)">FR</button>
        <button class="l-btn" onclick="setLanguage('ru', this)">RU</button>
    </div>

    <form id="loginForm">
        <label id="lbl-num">Članski broj / Kundennummer</label>
        <input type="text" id="login-num" placeholder="123456" required>
        
        <label id="lbl-pw">Lozinka / Passwort</label>
        <input type="password" id="login-pw" placeholder="******" required>

        <button type="submit" class="btn-submit" id="btn-login" style="background:#c5a059; color:#092e54;">PRIJAVI SE</button>
    </form>

    <div style="margin-top: 20px; font-size: 0.9rem;">
        <span id="txt-footer" style="color:#aaa;">Niste još član?</span> 
        <a href="index.html" id="link-reg" style="color:#c5a059; text-decoration:none;">Registracija</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const trans = {
        sr: { sub: "Prijava članova", num: "Članski broj", pw: "Lozinka", btn: "PRIJAVI SE", foot: "Niste još član?", reg: "Registracija" },
        de: { sub: "Mitglieder-Login", num: "Kundennummer", pw: "Passwort", btn: "EINLOGGEN", foot: "Noch kein Mitglied?", reg: "Registrierung" },
        en: { sub: "Member Login", num: "Customer Number", pw: "Password", btn: "LOGIN", foot: "Not a member yet?", reg: "Register" },
        fr: { sub: "Connexion membre", num: "Numéro de client", pw: "Mot de passe", btn: "SE CONNECTER", foot: "Pas encore membre ?", reg: "Inscription" },
        ru: { sub: "Вход для членов", num: "Номер клиента", pw: "Пароль", btn: "ВОЙТИ", foot: "Еще не член?", reg: "Регистрация" }
    };

    window.setLanguage = (l, btn) => {
        const t = trans[l];
        document.getElementById('sub-title').innerText = t.sub;
        document.getElementById('lbl-num').innerText = t.num;
        document.getElementById('lbl-pw').innerText = t.pw;
        document.getElementById('btn-login').innerText = t.btn;
        document.getElementById('txt-footer').innerText = t.foot;
        document.getElementById('link-reg').innerText = t.reg;
        
        document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    };

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const num = document.getElementById('login-num').value;
        const pw = document.getElementById('login-pw').value;

        // Suche in Firestore nach dem Dokument mit dieser memberID
        const q = query(collection(db, "users"), where("memberID", "==", num));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
            alert("Članski broj nije pronađen / Nummer nicht gefunden.");
            return;
        }

        let userFound = false;
        querySnapshot.forEach((doc) => {
            const userData = doc.data();
            if (userData.password === pw) {
                userFound = true;
                // Speichere ID lokal für das Profil
                localStorage.setItem('currentUser', doc.id); 
                window.location.href = "user.html"; 
            }
        });

        if (!userFound) {
            alert("Pogrešna lozinka / Falsches Passwort.");
        }
    };
</script>
</body>
</html>
