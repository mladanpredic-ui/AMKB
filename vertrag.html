<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ugovor | AK Balkan</title>
    <link rel="stylesheet" href="style.css"> <style>
        .paper { background: white; max-width: 800px; margin: 20px auto; padding: 40px; border: 1px solid #ddd; }
        .contract-grid { display: flex; gap: 20px; }
        .col { flex: 1; font-size: 12px; text-align: justify; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="paper" id="pdfContent">
    <h2 style="text-align:center; color:#092e54;">UGOVOR O ČLANSTVU</h2>
    
    <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin-bottom:20px;">
        <p><strong>ID:</strong> <span id="v-id"></span></p>
        <p><strong>Član / Member:</strong> <span id="v-name"></span></p>
        <p><strong>Tablice / Plate:</strong> <span id="v-lp"></span></p>
        <p><strong>Paket / Package:</strong> <b id="v-pk" style="color:#c5a059;"></b></p>
    </div>

    <div class="contract-grid">
        <div class="col">
            <h3 style="font-size:14px;">SRPSKI</h3>
            <p>Ovim ugovorom se potvrđuje članstvo u Auto Klubu Balkan. Član ima pravo na pomoć na putu u skladu sa izabranim paketom u trajanju od 12 meseci...</p>
        </div>
        <div class="col" id="lang-col">
            </div>
    </div>
</div>

<div style="text-align:center;" class="no-print">
    <button class="btn-submit" style="width:200px;" onclick="window.print()">ŠTAMPAJ UGOVOR (PDF)</button>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('v-id').innerText = params.get('id');
    document.getElementById('v-name').innerText = params.get('fn') + " " + params.get('ln');
    document.getElementById('v-lp').innerText = params.get('lp');
    document.getElementById('v-pk').innerText = params.get('pk');

    const lang = params.get('lg');
    const langCol = document.getElementById('lang-col');

    const trans = {
        de: "<h3>DEUTSCH</h3><p>Diese Vereinbarung bestätigt die Mitgliedschaft im Auto Klub Balkan. Das Mitglied hat Anspruch auf Pannenhilfe gemäß dem gewählten Paket für 12 Monate...</p>",
        en: "<h3>ENGLISH</h3><p>This agreement confirms membership in Auto Klub Balkan. The member is entitled to roadside assistance according to the selected package for 12 months...</p>",
        fr: "<h3>FRANÇAIS</h3><p>Cet accord confirme l'adhésion au Auto Klub Balkan. Le membre a droit à une assistance routière selon le forfait choisi pendant 12 mois...</p>",
        ru: "<h3>PУССКИЙ</h3><p>Настоящее соглашение подтверждает членство в Авто Клубе Балкан. Участник имеет право на помощь на дороге в соответствии с выбранным пакетом в течение 12 месяцев...</p>"
    };

    if(trans[lang]) {
        langCol.innerHTML = trans[lang];
    } else {
        langCol.innerHTML = "<h3>INFO</h3><p>No second language selected.</p>";
    }
</script>
</body>
</html>
