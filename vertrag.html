<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Ugovor o članstvu | AK Balkan</title>
    <style>
        body { background: #555; padding: 50px; font-family: "Times New Roman", serif; }
        .paper { background: white; width: 210mm; min-height: 297mm; margin: auto; padding: 20mm; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .content { margin-top: 30px; line-height: 1.5; font-size: 14px; }
        .dual-lang { display: flex; gap: 20px; margin-bottom: 20px; }
        .sr { flex: 1; font-weight: bold; }
        .sec { flex: 1; font-style: italic; color: #444; border-left: 1px solid #ddd; padding-left: 10px; }
        .no-print { position: fixed; top: 20px; right: 20px; background: #c5a059; padding: 15px; border: none; cursor: pointer; font-weight: bold; }
        @media print { .no-print { display: none; } body { background: none; padding: 0; } .paper { box-shadow: none; margin: 0; } }
    </style>
</head>
<body>

<button class="no-print" onclick="window.print()">ŠTAMPAJ UGOVOR (PDF)</button>

<div class="paper">
    <div class="header">
        <div><strong>AUTOKLUB BALKAN</strong><br>Pomoć na putu</div>
        <div id="mID-display" style="font-size: 20px; color: #a52a2a;"></div>
    </div>

    <div class="content">
        <h2 style="text-align:center">UGOVOR O ČLANSTVU / MEMBERSHIP AGREEMENT</h2>
        
        <p><strong>Član / Member:</strong> <span id="name-display"></span></p>
        <p><strong>Vozilo / Vehicle:</strong> <span id="plate-display"></span></p>

        <hr>

        <div id="legal-text">
            </div>

        <div style="margin-top: 100px; display: flex; justify-content: space-between;">
            <div>__________________________<br>Potpis člana (Kunde)</div>
            <div>__________________________<br>AK Balkan (M. Mitrović)</div>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('mID-display').innerText = "ID: " + urlParams.get('id');
    document.getElementById('name-display').innerText = urlParams.get('fn') + " " + urlParams.get('ln');
    document.getElementById('plate-display').innerText = urlParams.get('lp');

    const lang = urlParams.get('lg');
    const legalDiv = document.getElementById('legal-text');

    const texts = {
        de: { sr: "Član ima pravo na besplatno šlepanje do 100km.", sec: "Das Mitglied hat Anspruch auf kostenloses Abschleppen bis 100km." },
        en: { sr: "Član ima pravo na besplatno šlepanje do 100km.", sec: "The member is entitled to free towing up to 100km." }
    };

    if(lang !== 'sr' && texts[lang]) {
        legalDiv.innerHTML = `
            <div class="dual-lang">
                <div class="sr">${texts[lang].sr}</div>
                <div class="sec">${texts[lang].sec}</div>
            </div>
            <div class="dual-lang">
                <div class="sr">Ugovor stupa na snagu nakon uplate.</div>
                <div class="sec">Der Vertrag tritt nach Zahlungseingang in Kraft.</div>
            </div>
        `;
    } else {
        legalDiv.innerHTML = `<p>Član ima pravo na besplatno šlepanje do 100km. Ugovor stupa na snagu nakon uplate.</p>`;
    }
</script>
</body>
</html>
