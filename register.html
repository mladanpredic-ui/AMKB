<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AK Balkan | Registracija</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --dark-bg: #061f3a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: var(--white); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-container { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .logo-area h1 { color: var(--gold); margin: 0; font-size: 1.8rem; letter-spacing: 2px; }
        .lang-bar { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .lang-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
        .full-width { grid-column: span 2; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #aaa; margin-top: 10px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a2a3a; color: white; box-sizing: border-box; font-size: 1rem; }
        button#btn-register { width: 100%; padding: 15px; background: var(--gold); color: var(--akb-blue); border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 25px; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-area">
        <h1>AK BALKAN</h1>
        <p id="sub-title">Registracija novog člana</p>
    </div>

    <div class="lang-bar">
        <button class="lang-btn" onclick="setLanguage('sr')">SRB</button>
        <button class="lang-btn" onclick="setLanguage('de')">DE</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('fr')">FR</button>
        <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
    </div>

    <form onsubmit="return false;">
        <div class="form-grid">
            <div><label id="lbl-fname">Ime</label><input type="text" id="reg-fname" required></div>
            <div><label id="lbl-lname">Prezime</label><input type="text" id="reg-lname" required></div>
            <div class="full-width"><label id="lbl-addr">Adresa</label><input type="text" id="reg-address" required></div>
            <div class="full-width"><label id="lbl-phone">Telefon</label><input type="tel" id="reg-phone" required></div>
            <div class="full-width"><label id="lbl-email">E-Mail</label><input type="email" id="reg-email" required></div>
            <div><label id="lbl-pw">Lozinka</label><input type="password" id="reg-pw" required></div>
            <div><label id="lbl-pw2">Potvrda</label><input type="password" id="reg-pw2" required></div>
        </div>
        <button id="btn-register" onclick="handleRegister()">Postani član</button>
    </form>
    <p style="margin-top:20px"><a href="login.html" style="color:var(--gold); text-decoration:none" id="link-login">Prijava</a></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, runTransaction, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const trans = {
        sr: { sub: "Registracija člana", fname: "Ime", lname: "Prezime", btn: "Postani član", login: "Prijava" },
        de: { sub: "Mitglied werden", fname: "Vorname", lname: "Nachname", btn: "Jetzt registrieren", login: "Login" }
        // ... (weitere Sprachen wie oben)
    };

    window.setLanguage = (l) => {
        const t = trans[l] || trans.sr;
        document.getElementById('sub-title').innerText = t.sub;
        document.getElementById('lbl-fname').innerText = t.fname;
        document.getElementById('lbl-lname').innerText = t.lname;
        document.getElementById('btn-register').innerText = t.btn;
        document.getElementById('link-login').innerText = t.login;
    };

    window.handleRegister = async () => {
        const fn = document.getElementById('reg-fname').value;
        const ln = document.getElementById('reg-lname').value;
        const em = document.getElementById('reg-email').value;
        const pw = document.getElementById('reg-pw').value;

        try {
            const customerNumber = await runTransaction(db, async (transaction) => {
                const cRef = doc(db, "config", "customerCounter");
                const cSnap = await transaction.get(cRef);
                const newNum = cSnap.exists() ? cSnap.data().lastNumber + 1 : 100001;
                transaction.set(cRef, { lastNumber: newNum });
                return newNum;
            });

            const authEmail = `${customerNumber}@ak-balkan.com`;
            const userCred = await createUserWithEmailAndPassword(auth, authEmail, pw);
            
            await setDoc(doc(db, "users", userCred.user.uid), {
                customerNumber, firstName: fn, lastName: ln, realEmail: em, role: "member"
            });

            alert(`Dobrodošli! Vaš broj je: ${customerNumber}`);
            window.location.href = "login.html";
        } catch (e) { alert("Greška: " + e.message); }
    };
</script>
</body>
</html>
