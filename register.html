<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AK Balkan | Registracija</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --dark-bg: #061f3a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: var(--white); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .auth-container { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid rgba(197, 160, 89, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        
        .logo-area h1 { color: var(--gold); margin: 0; font-size: 1.8rem; letter-spacing: 2px; }
        .lang-bar { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .lang-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .lang-btn:hover { background: rgba(197, 160, 89, 0.2); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
        .full-width { grid-column: span 2; }

        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #aaa; margin-top: 10px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a2a3a; color: white; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: var(--gold); outline: none; border-width: 2px; }

        button#btn-register { 
            width: 100%; padding: 15px; background: var(--gold); color: var(--akb-blue); 
            border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; 
            cursor: pointer; margin-top: 25px; transition: 0.3s; 
        }
        button#btn-register:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(197, 160, 89, 0.4); }
        
        .footer-link { margin-top: 20px; font-size: 0.9rem; color: #aaa; }
        .footer-link a { color: var(--gold); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-area">
        <h1>AK BALKAN</h1>
        <p id="sub-title">Registracija novog člana</p>
    </div>

    <div class="lang-bar">
        <button class="lang-btn" onclick="setLanguage('sr')">SRB</button>
        <button class="lang-btn" onclick="setLanguage('de')">DE</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('fr')">FR</button>
        <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
    </div>

    <form id="reg-form" onsubmit="return false;">
        <div class="form-grid">
            <div>
                <label id="lbl-fname">Ime</label>
                <input type="text" id="reg-fname" required>
            </div>
            <div>
                <label id="lbl-lname">Prezime</label>
                <input type="text" id="reg-lname" required>
            </div>
            
            <div class="full-width">
                <label id="lbl-addr">Adresa</label>
                <input type="text" id="reg-address" required>
            </div>

            <div class="full-width">
                <label id="lbl-phone">Telefon</label>
                <input type="tel" id="reg-phone" required>
            </div>

            <div class="full-width">
                <label id="lbl-email">E-Mail adresa</label>
                <input type="email" id="reg-email" required placeholder="example@mail.com">
            </div>

            <div>
                <label id="lbl-pw">Lozinka</label>
                <input type="password" id="reg-pw" required>
            </div>
            <div>
                <label id="lbl-pw2">Potvrdi lozinku</label>
                <input type="password" id="reg-pw2" required>
            </div>
        </div>

        <button type="submit" id="btn-register" onclick="handleRegister()">Postani član</button>
    </form>

    <div class="footer-link">
        <span id="txt-footer">Već ste član?</span> <a href="login.html" id="link-login">Prijava</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, runTransaction, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const trans = {
        sr: { sub: "Registracija člana", fname: "Ime", lname: "Prezime", addr: "Adresa", ph: "Telefon", email: "E-Mail adresa", pw: "Lozinka", pw2: "Potvrdi lozinku", btn: "Postani član", foot: "Već ste član?", login: "Prijava", errAll: "Sva polja su obavezna!", errMatch: "Lozinke se ne podudaraju!" },
        de: { sub: "Mitglied werden", fname: "Vorname", lname: "Nachname", addr: "Adresse", ph: "Telefon", email: "E-Mail Adresse", pw: "Passwort", pw2: "Passwort bestätigen", btn: "Jetzt registrieren", foot: "Schon Mitglied?", login: "Login", errAll: "Alle Felder sind Pflichtfelder!", errMatch: "Passwörter stimmen nicht überein!" },
        en: { sub: "Member Registration", fname: "First Name", lname: "Last Name", addr: "Address", ph: "Phone", email: "Email Address", pw: "Password", pw2: "Confirm Password", btn: "Join Now", foot: "Already a member?", login: "Sign in", errAll: "All fields are required!", errMatch: "Passwords do not match!" },
        fr: { sub: "Inscription", fname: "Prénom", lname: "Nom", addr: "Adresse", ph: "Téléphone", email: "Adresse e-mail", pw: "Mot de passe", pw2: "Confirmer le mot de passe", btn: "S'inscrire", foot: "Déjà membre?", login: "Connexion", errAll: "Tous les champs sont obligatoires!", errMatch: "Les mots de passe ne correspondent pas!" },
        ru: { sub: "Регистрация", fname: "Имя", lname: "Фамилия", addr: "Адрес", ph: "Телефон", email: "E-Mail адрес", pw: "Пароль", pw2: "Подтвердите пароль", btn: "Стать членом", foot: "Уже есть аккаунт?", login: "Вход", errAll: "Все поля обязательны!", errMatch: "Пароли не совпадают!" }
    };

    let currentLang = 'sr';

    window.setLanguage = (l) => {
        currentLang = l;
        const t = trans[l];
        document.getElementById('sub-title').innerText = t.sub;
        document.getElementById('lbl-fname').innerText = t.fname;
        document.getElementById('lbl-lname').innerText = t.lname;
        document.getElementById('lbl-addr').innerText = t.addr;
        document.getElementById('lbl-phone').innerText = t.ph;
        document.getElementById('lbl-email').innerText = t.email;
        document.getElementById('lbl-pw').innerText = t.pw;
        document.getElementById('lbl-pw2').innerText = t.pw2;
        document.getElementById('btn-register').innerText = t.btn;
        document.getElementById('txt-footer').innerText = t.foot;
        document.getElementById('link-login').innerText = t.login;
    };

    window.handleRegister = async () => {
        const fn = document.getElementById('reg-fname').value;
        const ln = document.getElementById('reg-lname').value;
        const ad = document.getElementById('reg-address').value;
        const ph = document.getElementById('reg-phone').value;
        const em = document.getElementById('reg-email').value;
        const pw = document.getElementById('reg-pw').value;
        const pw2 = document.getElementById('reg-pw2').value;

        if(!fn || !ln || !ad || !ph || !em || !pw || !pw2) {
            alert(trans[currentLang].errAll);
            return;
        }

        if(pw !== pw2) {
            alert(trans[currentLang].errMatch);
            return;
        }

        try {
            const customerNumber = await runTransaction(db, async (transaction) => {
                const cRef = doc(db, "config", "customerCounter");
                const cSnap = await transaction.get(cRef);
                const newNum = cSnap.exists() ? cSnap.data().lastNumber + 1 : 100001;
                transaction.set(cRef, { lastNumber: newNum });
                return newNum;
            });

            // Login erfolgt über die Kundennummer als Pseudonym-Email
            const authEmail = `${customerNumber}@ak-balkan.com`;
            const userCred = await createUserWithEmailAndPassword(auth, authEmail, pw);
            
            // Vollständiges Profil in Firestore speichern
            await setDoc(doc(db, "users", userCred.user.uid), {
                customerNumber, 
                firstName: fn, 
                lastName: ln, 
                address: ad, 
                phone: ph, 
                realEmail: em,
                joinDate: new Date().toISOString(),
                role: "member"
            });

            alert(`Dobrodošli! Vaš članski broj je: ${customerNumber} | Vaš broj je Vaš LOGIN.`);
            window.location.href = "login.html";
        } catch (e) { 
            alert("Greška: " + e.message); 
        }
    };
</script>
</body>
</html>
