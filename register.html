<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Registracija | AK Balkan</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        .reg-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #092e54; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .checkbox-group { font-size: 13px; margin: 15px 0; }
        .btn-reg { background: #092e54; color: white; width: 100%; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="reg-card">
    <h2>ČLANSKA REGISTRACIJA</h2>
    <form id="mainRegForm">
        <input type="text" id="fname" placeholder="Ime" required>
        <input type="text" id="lname" placeholder="Prezime" required>
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="text" id="plate" placeholder="Registarska oznaka" required>
        
        <label>Izaberite drugi jezik ugovora:</label>
        <select id="lang">
            <option value="sr">Samo Srpski</option>
            <option value="de">Srpski + Nemački (Deutsch)</option>
            <option value="en">Srpski + Engleski (English)</option>
        </select>

        <div class="checkbox-group">
            <input type="checkbox" required> Prihvatam AGB i polisu privatnosti.
        </div>
        
        <button type="submit" class="btn-reg">REGISTRUJ SE & KREIRAJ UGOVOR</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('mainRegForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const mID = Math.floor(100000 + Math.random() * 900000).toString(); // 6 ZAHLEN
        
        const data = {
            memberID: mID,
            firstName: document.getElementById('fname').value,
            lastName: document.getElementById('lname').value,
            email: document.getElementById('email').value,
            licensePlate: document.getElementById('plate').value,
            lang: document.getElementById('lang').value,
            status: "čeka_uplatu"
        };

        await addDoc(collection(db, "users"), data);
        // DATEN AN VERTRAG WEITERGEBEN
        window.location.href = `vertrag.html?id=${mID}&fn=${data.firstName}&ln=${data.lastName}&lp=${data.licensePlate}&lg=${data.lang}`;
    });
</script>
</body>
</html>
