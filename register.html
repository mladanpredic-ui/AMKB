<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registracija | AK Balkan</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --dark: #061f3a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .reg-card { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold); border-radius: 20px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--gold); text-align: center; margin-bottom: 5px; font-size: 2rem; }
        h2 { text-align: center; font-weight: 300; font-size: 1rem; margin-bottom: 20px; opacity: 0.8; }
        .lang-switch { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; }
        .lang-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; font-weight: bold; transition: 0.3s; }
        .lang-btn:hover, .lang-btn.active { background: var(--gold); color: var(--akb-blue); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        input { background: #1a2a3a; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }
        .btn-action { background: var(--gold); color: var(--akb-blue); border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 25px; font-size: 1rem; }
        .login-link { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        .login-link a { color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>

<div class="reg-card">
    <h1>AK BALKAN</h1>
    <h2 id="txt-subtitle">Registracija novog člana</h2>

    <div class="lang-switch">
        <button class="lang-btn" onclick="setLanguage('srb')">SRB</button>
        <button class="lang-btn" onclick="setLanguage('de')">DE</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('fr')">FR</button>
        <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
    </div>

    <div class="grid">
        <input type="text" id="fname" placeholder="Ime">
        <input type="text" id="lname" placeholder="Prezime">
        <input type="text" id="address" class="full" placeholder="Adresa">
        <input type="text" id="phone" class="full" placeholder="Telefon">
        <input type="email" id="email" class="full" placeholder="E-Mail">
        <input type="password" id="pass" placeholder="Lozinka">
        <input type="password" id="confirm" placeholder="Potvrda">
    </div>

    <button class="btn-action" id="btn-submit" onclick="handleRegister()">POSTANI ČLAN</button>
    
    <div class="login-link">
        <a href="login.html" id="link-login">Prijava</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCMsL8TmGrCda-Btnpn0u8mUpWLo6q_aMY",
      authDomain: "autoklub-balkan.firebaseapp.com",
      projectId: "autoklub-balkan",
      storageBucket: "autoklub-balkan.firebasestorage.app",
      messagingSenderId: "499546593125",
      appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const translations = {
        srb: { subtitle: "Registracija novog člana", fname: "Ime", lname: "Prezime", addr: "Adresa", ph: "Telefon", mail: "E-Mail", pw: "Lozinka", cpw: "Potvrda", btn: "POSTANI ČLAN", log: "Prijava", err_pw: "Lozinke se ne podudaraju!" },
        de: { subtitle: "Registrierung neues Mitglied", fname: "Vorname", lname: "Nachname", addr: "Adresse", ph: "Telefon", mail: "E-Mail", pw: "Passwort", cpw: "Bestätigen", btn: "MITGLIED WERDEN", log: "Anmelden", err_pw: "Passwörter nicht gleich!" },
        en: { subtitle: "New Member Registration", fname: "First Name", lname: "Last Name", addr: "Address", ph: "Phone", mail: "E-Mail", pw: "Password", cpw: "Confirm", btn: "BECOME A MEMBER", log: "Login", err_pw: "Passwords do not match!" },
        fr: { subtitle: "Inscription nouveau membre", fname: "Prénom", lname: "Nom", addr: "Adresse", ph: "Téléphone", mail: "E-Mail", pw: "Mot de passe", cpw: "Confirmer", btn: "DEVENIR MEMBRE", log: "Connexion", err_pw: "Mots de passe différents!" },
        ru: { subtitle: "Регистрация нового участника", fname: "Имя", lname: "Фамилия", addr: "Адres", ph: "Телефон", mail: "E-Mail", pw: "Пароль", cpw: "Подтверждение", btn: "СТАТЬ УЧАСТНИКОМ", log: "Войти", err_pw: "Пароли не совпадают!" }
    };

    window.setLanguage = (lang) => {
        const t = translations[lang];
        document.getElementById('txt-subtitle').innerText = t.subtitle;
        document.getElementById('fname').placeholder = t.fname;
        document.getElementById('lname').placeholder = t.lname;
        document.getElementById('address').placeholder = t.addr;
        document.getElementById('phone').placeholder = t.ph;
        document.getElementById('email').placeholder = t.mail;
        document.getElementById('pass').placeholder = t.pw;
        document.getElementById('confirm').placeholder = t.cpw;
        document.getElementById('btn-submit').innerText = t.btn;
        document.getElementById('link-login').innerText = t.log;
        localStorage.setItem('akb_lang', lang);
    };

    window.handleRegister = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const conf = document.getElementById('confirm').value;
        const lang = localStorage.getItem('akb_lang') || 'srb';

        if(pass !== conf) return alert(translations[lang].err_pw);

        try {
            // 1. Account erstellen
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            const user = userCred.user;

            // 2. Profildaten speichern (Sicherheitsregeln erlauben dies für die eigene UID)
            await setDoc(doc(db, "users", user.uid), {
                firstName: document.getElementById('fname').value,
                lastName: document.getElementById('lname').value,
                address: document.getElementById('address').value,
                phone: document.getElementById('phone').value,
                email: email,
                role: "member",
                createdAt: serverTimestamp()
            });

            alert("Uspešna registracija!");
            window.location.href = "index.html"; 
        } catch (e) {
            alert("Greška: " + e.message);
        }
    };

    // Auto-load language
    document.addEventListener('DOMContentLoaded', () => {
        setLanguage(localStorage.getItem('akb_lang') || 'srb');
    });
</script>

</body>
</html>
