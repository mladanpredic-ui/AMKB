<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AK Balkan | Profil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="reg-card">
    <div class="header-area">
        <h1 id="user-welcome">Profil člana</h1>
        <div id="status-container">
            <span id="status-pill" class="status-pill">Provera statusa...</span>
        </div>
    </div>

    <div class="user-info-section">
        <div class="info-row">
            <label class="label">Ime i Prezime:</label>
            <div id="m-name" class="info-val">-</div>
        </div>
        <div class="info-row">
            <label class="label">Članski broj (ID):</label>
            <div id="m-id" class="info-val">-</div>
        </div>
        <div class="info-row">
            <label class="label">Registarska oznaka:</label>
            <div id="m-plate" class="info-val">-</div>
        </div>
        <div class="info-row">
            <label class="label">Paket:</label>
            <div id="m-package" class="info-val">-</div>
        </div>
    </div>

    <hr style="border: 0; border-top: 1px solid rgba(197, 160, 89, 0.2); margin: 20px 0;">

    <!-- SOS SECTION -->
    <div id="sos-section">
        <h2 style="color: var(--red-sos); margin-bottom: 20px;">🚨 POMOĆ NA PUTU</h2>
        <p style="font-size: 12px; margin-bottom: 15px; color: rgba(255,255,255,0.8);">Klikom na dugme šaljete Vašu tačnu lokaciju našem centru.</p>
        
        <!-- SOS MODAL -->
        <div id="sos-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center;">
            <div style="background: linear-gradient(135deg, #092e54, #061a30); padding: 30px; border-radius: 15px; max-width: 400px; width: 90%; border: 2px solid #c5a059;">
                <h3 style="color: var(--red-sos); margin-bottom: 20px; text-align: center;">⚠️ VRSTA DEFEKTA</h3>
                
                <div style="display: grid; gap: 10px; max-height: 400px; overflow-y: auto;">
                    <button onclick="window.sendSOS('Pokvaren motor')" style="padding: 15px; background: rgba(230, 57, 70, 0.2); border: 2px solid var(--red-sos); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: left; transition: 0.3s;">🔧 Pokvaren motor</button>
                    
                    <button onclick="window.sendSOS('Pučena guma')" style="padding: 15px; background: rgba(230, 57, 70, 0.2); border: 2px solid var(--red-sos); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: left; transition: 0.3s;">🛞 Pučena guma</button>
                    
                    <button onclick="window.sendSOS('Mrtav akumulator')" style="padding: 15px; background: rgba(230, 57, 70, 0.2); border: 2px solid var(--red-sos); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: left; transition: 0.3s;">🔋 Mrtav akumulator</button>
                    
                    <button onclick="window.sendSOS('Problemi sa streljanjem')" style="padding: 15px; background: rgba(230, 57, 70, 0.2); border: 2px solid var(--red-sos); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: left; transition: 0.3s;">⚡ Problemi sa streljanjem</button>
                    
                    <button onclick="window.sendSOS('Ulje / Tečnosti')" style="padding: 15px; background: rgba(230, 57, 70, 0.2); border: 2px solid var(--red-sos); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: left; transition: 0.3s;">💧 Curenje ulja/tečnosti</button>
                    
                    <button onclick="window.sendSOS('Saobraćajni incident')" style="padding: 15px; background: rgba(230, 57, 70, 0.2); border: 2px solid var(--red-sos); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: left; transition: 0.3s;">🚗 Saobraćajni incident</button>
                    
                    <button onclick="window.sendSOS('Drugi problem')" style="padding: 15px; background: rgba(230, 57, 70, 0.2); border: 2px solid var(--red-sos); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: left; transition: 0.3s;">❓ Drugi problem</button>
                    
                    <button onclick="window.closeSosModal()" style="padding: 15px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255,255,255,0.3); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px;">✕ Otkaži</button>
                </div>
            </div>
        </div>

        <!-- SOS BUTTON -->
        <button id="sos-trigger" style="background: linear-gradient(135deg, var(--red-sos), #c41e3a); color: white; font-size: 20px; padding: 20px; width: 100%; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px rgba(230, 57, 70, 0.5);">
            ⚠️ POŠALJI SOS
        </button>
        
        <p id="sos-msg" style="display:none; color: var(--green-active); margin-top: 15px; font-weight: bold; text-align: center; animation: pulse-msg 1s infinite;">
            ✅ SOS poslat! Pomoć stiže.
        </p>
    </div>

    <hr style="border: 0; border-top: 1px solid rgba(197, 160, 89, 0.2); margin: 20px 0;">

    <button onclick="handleLogout()" style="background: rgba(255, 255, 255, 0.1); color: white; border: 2px solid var(--gold); padding: 12px 20px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;">🚪 Odjavi se / Logout</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const userId = localStorage.getItem('currentUser');
    if (!userId) window.location.href = "login.html";

    let userData = null;

    // ==================== LOAD USER ====================
    async function loadUser() {
        const userDoc = await getDoc(doc(db, "users", userId));
        if (userDoc.exists()) {
            userData = userDoc.data();
            document.getElementById('m-name').innerText = userData.firstName + " " + userData.lastName;
            document.getElementById('m-id').innerText = userData.memberID;
            document.getElementById('m-plate').innerText = userData.licensePlate;
            document.getElementById('m-package').innerText = userData.package;
            
            const pill = document.getElementById('status-pill');
            if (userData.status === "zugang_aktiv") {
                pill.innerText = "✓ AKTIVAN ČLAN";
                pill.style.background = "var(--green-active)";
            } else {
                pill.innerText = "⏳ ČEKA UPLATU";
                pill.style.background = "var(--red-sos)";
                document.getElementById('sos-trigger').disabled = true;
                document.getElementById('sos-trigger').style.opacity = "0.5";
                document.getElementById('sos-trigger').style.cursor = "not-allowed";
            }
        }
    }

    // ==================== SOS TRIGGER ====================
    document.getElementById('sos-trigger').onclick = () => {
        if (!userData || userData.status !== "zugang_aktiv") {
            alert("Vaš nalog nije aktiviran. Molimo čekajte na potvrdu.");
            return;
        }
        // Prikaži modal za izbor pannenart
        document.getElementById('sos-modal').style.display = 'flex';
    };

    // ==================== CLOSE MODAL ====================
    window.closeSosModal = () => {
        document.getElementById('sos-modal').style.display = 'none';
    };

    // Zatvori modal klikom van njega
    document.getElementById('sos-modal').addEventListener('click', (e) => {
        if (e.target.id === 'sos-modal') {
            window.closeSosModal();
        }
    });

    // ==================== SEND SOS ====================
    window.sendSOS = async (issueType) => {
        document.getElementById('sos-modal').style.display = 'none';
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    try {
                        // Kreiraj SOS-Eintrag in Firebase
                        const sosRef = await addDoc(collection(db, "sos_calls"), {
                            name: userData.firstName + " " + userData.lastName,
                            memberID: userData.memberID,
                            plate: userData.licensePlate,
                            package: userData.package,
                            issue_type: issueType,
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            status: "novo",
                            created_at: serverTimestamp(),
                            user_id: userId
                        });

                        // Spielsound
                        playAlarmSound();

                        // Zeige Bestätigung
                        document.getElementById('sos-msg').style.display = 'block';
                        document.getElementById('sos-trigger').innerText = "📍 SOS GESENDET - WARTE ANTWORT";
                        document.getElementById('sos-trigger').disabled = true;

                        // Nach 5 Sekunden zurücksetzen
                        setTimeout(() => {
                            document.getElementById('sos-msg').style.display = 'none';
                            document.getElementById('sos-trigger').innerText = "⚠️ POŠALJI SOS";
                            document.getElementById('sos-trigger').disabled = false;
                        }, 5000);

                        console.log("SOS erstellt:", sosRef.id);
                    } catch (err) {
                        alert("Fehler beim Senden: " + err.message);
                    }
                },
                (error) => {
                    alert("GPS nicht verfügbar: " + error.message);
                }
            );
        }
    };

    // ==================== ALARM SOUND ====================
    function playAlarmSound() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            oscillator.connect(gain);
            gain.connect(audioContext.destination);
            
            // Alarm-Ton: 800Hz für 500ms
            oscillator.frequency.value = 800;
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        } catch (e) {
            console.log("Audio nicht möglich");
        }
    }

    // ==================== LOGOUT ====================
    window.handleLogout = () => {
        localStorage.removeItem('currentUser');
        window.location.href = "login.html";
    };

    // ==================== INIT ====================
    loadUser();
</script>

<style>
    .info-row { 
        text-align: left; 
        margin-bottom: 15px; 
    }
    
    .info-val { 
        background: rgba(255,255,255,0.1); 
        padding: 10px; 
        border-radius: 5px; 
        border-left: 3px solid var(--gold); 
        word-break: break-all;
    }
    
    .status-pill { 
        padding: 8px 15px; 
        border-radius: 20px; 
        font-size: 12px; 
        font-weight: bold; 
        color: white; 
        display: inline-block; 
        margin-bottom: 20px; 
        text-shadow: 0 0 5px rgba(0,0,0,0.3);
    }

    .header-area {
        margin-bottom: 30px;
    }

    .header-area h1 {
        color: var(--gold);
        margin-bottom: 15px;
    }

    @keyframes pulse-msg {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
    }

    /* Mobile Optimierung */
    @media (max-width: 600px) {
        .reg-card {
            padding: 25px 15px;
        }
        
        #sos-trigger {
            padding: 15px !important;
            font-size: 16px !important;
        }
    }
</style>

</body>
</html>
