<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AK Balkan | Profil</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --dark-bg: #061f3a; --red: #a52a2a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: var(--white); margin: 0; text-align: center; }
        
        .header { background: var(--akb-blue); padding: 20px; border-bottom: 2px solid var(--gold); }
        .header h1 { color: var(--gold); margin: 0; font-size: 1.5rem; }
        
        .content { padding: 30px; max-width: 500px; margin: auto; }
        .user-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(197,160,89,0.3); margin-bottom: 30px; }
        .user-card h2 { margin: 0; color: var(--gold); }
        .user-card p { margin: 5px 0; color: #ccc; }

        .sos-btn { 
            width: 180px; height: 180px; border-radius: 50%; background: var(--red); color: white; 
            border: 8px solid rgba(255,255,255,0.1); font-size: 1.8rem; font-weight: bold; 
            cursor: pointer; box-shadow: 0 0 30px rgba(165,42,42,0.6); transition: 0.3s;
        }
        .sos-btn:active { transform: scale(0.9); box-shadow: 0 0 10px rgba(165,42,42,0.8); }

        .status-msg { margin-top: 15px; font-weight: bold; color: var(--gold); display: none; }
        
        .logout-btn { background: none; border: 1px solid #555; color: #888; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 50px; }
    </style>
</head>
<body>

<div class="header">
    <h1>AK BALKAN</h1>
</div>

<div class="content">
    <div class="user-card">
        <h2 id="display-name">Učitavanje...</h2>
        <p id="display-id">ID: ...</p>
        <p id="display-status">Status: Aktivan član</p>
    </div>

    <button class="sos-btn" id="sos-trigger">SOS</button>
    <div id="sos-status" class="status-msg">Signal poslat! Pomoć stiže.</div>

    <button class="logout-btn" onclick="handleLogout()">Odjavi se</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserData = null;

    // Prüfen, ob User eingeloggt ist und Daten laden
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                currentUserData = userDoc.data();
                document.getElementById('display-name').innerText = currentUserData.firstName + " " + currentUserData.lastName;
                document.getElementById('display-id').innerText = "ID: " + currentUserData.customerNumber;
            }
        } else {
            window.location.href = "login.html";
        }
    });

    // SOS FUNKTION
    document.getElementById('sos-trigger').onclick = async () => {
        if (!currentUserData) return;

        try {
            await addDoc(collection(db, "sos_calls"), {
                name: currentUserData.firstName + " " + currentUserData.lastName,
                phone: currentUserData.phone,
                customerNumber: currentUserData.customerNumber,
                status: "offen",
                timestamp: serverTimestamp(),
                type: "member_sos"
            });

            document.getElementById('sos-status').style.display = 'block';
            setTimeout(() => { document.getElementById('sos-status').style.display = 'none'; }, 5000);
            
            // Optional: Ein kurzer Ton am Handy des Users zur Bestätigung
            alert("Vaš SOS signal je poslat centrali!");
        } catch (e) {
            alert("Greška pri slanju SOS-a: " + e.message);
        }
    };

    window.handleLogout = () => {
        signOut(auth).then(() => { window.location.href = "login.html"; });
    };
</script>
</body>
</html>
