<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AK Balkan | Profil</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --dark-bg: #061f3a; --red: #a52a2a; --green: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: white; margin: 0; text-align: center; }
        .header { background: var(--akb-blue); padding: 20px; border-bottom: 2px solid var(--gold); }
        .content { padding: 30px; max-width: 500px; margin: auto; }
        
        .user-card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; border: 1px solid rgba(197,160,89,0.3); margin-bottom: 30px; }
        .user-card h2 { margin: 0; color: var(--gold); text-transform: uppercase; }
        
        .status-pill { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        .status-active { background: var(--green); color: white; box-shadow: 0 0 10px rgba(39, 174, 96, 0.4); }
        .status-wait { background: #f39c12; color: white; }

        .sos-btn { 
            width: 200px; height: 200px; border-radius: 50%; background: var(--red); color: white; 
            border: 10px solid rgba(255,255,255,0.1); font-size: 2rem; font-weight: bold; 
            cursor: pointer; box-shadow: 0 0 40px rgba(165,42,42,0.8); transition: 0.3s;
            margin: 20px 0;
        }
        .sos-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; opacity: 0.5; }
        .sos-btn:active { transform: scale(0.95); }

        .footer-info { color: #888; font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color: var(--gold); margin:0;">AK BALKAN</h1>
</div>

<div class="content">
    <div class="user-card">
        <h2 id="display-name">...</h2>
        <p id="display-id" style="color:#aaa; margin: 5px 0;">ID: ...</p>
        <div id="status-container">
            <span id="display-status" class="status-pill status-wait">Učitavanje...</span>
        </div>
    </div>

    <button class="sos-btn" id="sos-trigger" disabled>SOS</button>
    
    <p id="sos-msg" style="color: var(--gold); font-weight: bold; display:none;">Signal poslat! Lokacija poslata centrali.</p>

    <div class="footer-info">
        <p id="display-plate">Tablice: ...</p>
        <p id="display-package">Paket: ...</p>
    </div>

    <button class="btn-submit" onclick="handleLogout()" style="background:none; border:1px solid #444; color:#888; margin-top:40px;">ODJAVI SE</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Hole die Dokument-ID aus dem LocalStorage (vom Login gesetzt)
    const userDocId = localStorage.getItem('currentUser');

    if (!userDocId) {
        window.location.href = "login.html";
    }

    let userData = null;

    // Echtzeit-Überwachung der User-Daten (Status-Check)
    onSnapshot(doc(db, "users", userDocId), (snapshot) => {
        if (snapshot.exists()) {
            userData = snapshot.data();
            
            // UI Update
            document.getElementById('display-name').innerText = userData.firstName + " " + userData.lastName;
            document.getElementById('display-id').innerText = "ID: " + userData.memberID;
            document.getElementById('display-plate').innerText = "Tablice: " + userData.licensePlate;
            document.getElementById('display-package').innerText = "Paket: " + (userData.package || "Auto");

            const statusEl = document.getElementById('display-status');
            const sosBtn = document.getElementById('sos-trigger');

            if (userData.status === "zugang_aktiv") {
                statusEl.innerText = "PRISTUP AKTIVAN ✔️";
                statusEl.className = "status-pill status-active";
                sosBtn.disabled = false; // SOS erst freischalten, wenn bezahlt
            } else {
                statusEl.innerText = "ČEKA UPLATU...";
                statusEl.className = "status-pill status-wait";
                sosBtn.disabled = true;
            }
        }
    });

    // SOS FUNKTION mit GPS
    document.getElementById('sos-trigger').onclick = () => {
        if (!userData || userData.status !== "zugang_aktiv") return;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;

                try {
                    await addDoc(collection(db, "sos_calls"), {
                        name: userData.firstName + " " + userData.lastName,
                        memberID: userData.memberID,
                        plate: userData.licensePlate,
                        lat: lat,
                        lng: lng,
                        mapUrl: `https://www.google.com/maps?q=${lat},${lng}`,
                        status: "novo",
                        timestamp: serverTimestamp()
                    });
                    
                    document.getElementById('sos-msg').style.display = 'block';
                    alert("SOS POSLAT! Naša služba je primila vašu lokaciju.");
                } catch (e) {
                    alert("Greška: " + e.message);
                }
            }, () => {
                alert("Greška: Molimo uključite GPS lokaciju!");
            });
        }
    };

    window.handleLogout = () => {
        localStorage.removeItem('currentUser');
        window.location.href = "login.html";
    };
</script>
</body>
</html>
