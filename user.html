<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moj Profil | AK Balkan</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --red: #a52a2a; --dark-bg: #061f3a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: white; margin: 0; text-align: center; }
        .container { padding: 20px; max-width: 400px; margin: auto; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: var(--akb-blue); }
        .btn-sos { background: var(--red); color: white; font-size: 1.5rem; height: 150px; border-radius: 50%; box-shadow: 0 0 20px rgba(165,42,42,0.6); }
        
        #profile-section, #login-section { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="status-title">AK BALKAN</h2>

    <div id="login-section">
        <p>Prijavite se na vaš nalog</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Lozinka">
        <button class="btn btn-gold" onclick="login()">PRIJAVA</button>
    </div>

    <div id="profile-section">
        <p>Dobrodošli, <span id="user-display-name">Član</span></p>
        <div style="margin: 40px 0;">
            <button class="btn btn-sos" onclick="sendSOS()">SOS</button>
            <p style="color: var(--red); margin-top: 15px; font-weight: bold;">POŠALJI SIGNAL ZA POMOĆ</p>
        </div>
        <button class="btn" style="background:transparent; color:white; border:1px solid white;" onclick="logout()">Odjavi se</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 1. LOGIN FUNKTION
    window.login = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass)
            .catch(error => alert("Greška: " + error.message));
    };

    // 2. LOGOUT FUNKTION
    window.logout = () => signOut(auth);

    // 3. AUTH STATE CHECK (Prüft ob User eingeloggt ist)
    onAuthStateChanged(auth, (user) => {
        const loginSec = document.getElementById('login-section');
        const profileSec = document.getElementById('profile-section');
        
        if (user) {
            loginSec.style.display = 'none';
            profileSec.style.display = 'block';
            document.getElementById('user-display-name').innerText = user.email;
        } else {
            loginSec.style.display = 'block';
            profileSec.style.display = 'none';
        }
    });

    // 4. SOS SIGNAL SENDEN
    window.sendSOS = async () => {
        const user = auth.currentUser;
        if (!user) return;

        try {
            await addDoc(collection(db, "sos_calls"), {
                uid: user.uid,
                name: user.email, // Hier könnte man später den echten Namen aus Firestore laden
                problem: "Guma / Kvar",
                status: "offen",
                timestamp: serverTimestamp()
            });
            alert("Signal poslat! Pomoć stiže.");
        } catch (e) {
            alert("Greška pri slanju: " + e.message);
        }
    };
</script>
</body>
</html>
