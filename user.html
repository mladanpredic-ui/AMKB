<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korisnički Panel | AK Balkan</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --akb-red: #a52a2a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 30px; }
        .header { background: var(--akb-blue); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* SOS Dugme i Overlay */
        .sos-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .sos-card { background: white; width: 100%; max-width: 400px; border-radius: 12px; padding: 20px; text-align: center; }
        
        .sos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .sos-btn { 
            background: #fff; border: 2px solid #ddd; border-radius: 8px; padding: 15px 10px; 
            font-size: 14px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        
        /* KLASA KOJA JE PRAVILA PROBLEM - SADA JE PRAZNA DOK NE KLIKNEŠ */
        .sos-btn.active { border-color: var(--akb-blue); background: #eef4ff; box-shadow: 0 0 10px rgba(9,46,84,0.3); }

        .btn-send { background: var(--akb-red); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .btn-close { background: #666; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; }
        
        .main-sos-trigger { background: var(--akb-red); color: white; padding: 20px; border-radius: 50%; width: 80px; height: 80px; border: 5px solid white; font-weight: bold; font-size: 20px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin: 20px auto; display: block; }
    </style>
</head>
<body>

<div class="header">AK BALKAN - KORISNIK</div>

<div class="container">
    <button class="main-sos-trigger" onclick="openSosMenu()">SOS</button>
    <p style="text-align: center;">Pritisnite dugme za hitnu pomoć na putu</p>
</div>

<div id="sosOverlay" class="sos-overlay">
    <div class="sos-card">
        <h3 id="t-title">Vrsta kvara? / Pannenart?</h3>
        
        <div class="sos-grid">
            <button class="sos-btn" onclick="selectService(this, 'Slep sluzba')">🚚 <span>Šlep služba</span></button>
            <button class="sos-btn" onclick="selectService(this, 'E-Auto')">🔋 <span>E-Auto (Blokiran)</span></button>
            <button class="sos-btn" onclick="selectService(this, 'Starthilfe')">⚡ <span>Starthilfe / Kvar</span></button>
            <button class="sos-btn" onclick="selectService(this, 'Gorivo')">⛽ <span>Gorivo</span></button>
            <button class="sos-btn" onclick="selectService(this, 'Guma')">🎡 <span>Guma</span></button>
        </div>

        <div style="margin-top:15px; text-align: left; font-size: 12px;">
            <input type="checkbox" id="acceptTerms"> 
            <label for="acceptTerms">Prihvatam uslove / Ich akzeptiere die AGB</label>
        </div>

        <button class="btn-send" onclick="checkAndSend()">POŠALJI ZAHTEV / SENDEN</button>
        <button class="btn-close" onclick="closeSosMenu()">ZATVORI / SCHLIESSEN</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB...", // TVOJ API KEY KOJI VEĆ IMAŠ
        authDomain: "amkb-balkan.firebaseapp.com",
        projectId: "amkb-balkan",
        storageBucket: "amkb-balkan.appspot.com",
        messagingSenderId: "305111928091",
        appId: "1:305111928091:web:2c77dfa811776566050b9a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let odabraniKvar = "";

    window.openSosMenu = function() { document.getElementById('sosOverlay').style.display = 'flex'; };
    window.closeSosMenu = function() { document.getElementById('sosOverlay').style.display = 'none'; };

    // FUNKCIJA ZA ODABIR KOJA REŠAVA TVOJ PROBLEM
    window.selectService = function(element, tip) {
        const buttons = document.querySelectorAll('.sos-btn');
        buttons.forEach(btn => btn.classList.remove('active')); // Resetuj sve
        element.classList.add('active'); // Aktiviraj samo kliknuti
        odabraniKvar = tip;
    };

    window.checkAndSend = function() {
        if (!document.getElementById('acceptTerms').checked) {
            alert("Morate prihvatiti uslove!");
            return;
        }
        if (!odabraniKvar) {
            alert("Izaberite vrstu kvara!");
            return;
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { executeSend(pos.coords.latitude, pos.coords.longitude); },
                () => { executeSend(null, null); }
            );
        } else { executeSend(null, null); }
    };

    async function executeSend(lat, lon) {
        const userData = JSON.parse(localStorage.getItem('currentUser')) || { name: "Mladen" };
        try {
            await addDoc(collection(db, "sos_calls"), {
                name: userData.name,
                problem: odabraniKvar,
                lat: lat,
                lng: lon,
                timestamp: serverTimestamp(),
                status: "offen"
            });
            alert("Zahtev poslat! / Hilfe ist unterwegs!");
            closeSosMenu();
        } catch (e) {
            alert("Greška: " + e.message);
        }
    }
</script>

</body>
</html>
