<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>SOS Partner | AK Balkan</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .alarm-card { background: #a52a2a; padding: 40px; border-radius: 20px; margin: 50px auto; max-width: 500px; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .status-tag { padding: 10px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>SOS PANEL - ČEKA SE POZIV</h1>
    <div id="alarm-box" class="alarm-card">
        <h2 id="caller-name">Novi SOS Poziv!</h2>
        <p id="caller-problem"></p>
        <div id="member-check" class="status-tag">Provera članstva...</div>
        <hr>
        <button onclick="acceptCall()" style="padding:20px; width:100%; font-size:20px; cursor:pointer;">PRIHVATI INTERVENCIJU</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { /* DEINE CONFIG WIE OBEN */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "sos_calls"), (snap) => {
        snap.forEach(async (docSnap) => {
            const call = docSnap.data();
            if(call.status === "open") {
                // AUTOMATISCHE PRÜFUNG DES MITGLIEDSSTATUS
                const uQ = query(collection(db, "users"), where("memberID", "==", call.memberID));
                const uSnap = await getDocs(uQ);
                let isActive = false;
                if(!uSnap.empty) isActive = uSnap.docs[0].data().status === "AKTIV";

                document.getElementById('alarm-box').style.display = 'block';
                document.getElementById('caller-name').innerText = call.name;
                document.getElementById('caller-problem').innerText = call.problem;
                
                const checkDiv = document.getElementById('member-check');
                checkDiv.innerText = isActive ? "✅ ČLAN JE AKTIVAN" : "❌ NIJE PLAĆENO";
                checkDiv.style.background = isActive ? "green" : "black";
                
                let audio = new Audio('alarm.mp3');
                audio.play();
            }
        });
    });
</script>
</body>
</html>
