<div id="display-area">
    </div>

<script type="module">
    // ... (Firebase Importe wie gehabt) ...

    const partnerID = "partner_1"; // Jeder Partner hat eine ID
    const q = query(collection(db, "sos_calls"), where("status", "==", "searching"));

    onSnapshot(q, (snapshot) => {
        const display = document.getElementById('display-area');
        display.innerHTML = "";
        
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            
            // Logik: Bin ich der aktuell angefragte Partner?
            if (data.currentTargetPartner === partnerID) {
                const card = document.createElement('div');
                card.className = 'alarm-card';
                card.innerHTML = `
                    <h2>🚨 NOVI ZADATAK: ${data.name}</h2>
                    <p>Lokacija: ${data.lat}, ${data.lng}</p>
                    <div class="time-options">
                        <button onclick="respond('${docSnap.id}', 30)" style="background:green; color:white;">Stižem za 30 min</button>
                        <button onclick="respond('${docSnap.id}', 90)" style="background:orange; color:white;">Stižem za 60-90 min</button>
                    </div>
                `;
                display.appendChild(card);
            }
        });
    });

    window.respond = async (id, mins) => {
        const docRef = doc(db, "sos_calls", id);
        if (mins === 30) {
            // Sofortiger Zuschlag
            await updateDoc(docRef, { 
                status: "assigned", 
                acceptedBy: partnerID,
                eta: 30 
            });
        } else {
            // 3-Minuten-Warteschleife-Logik
            await updateDoc(docRef, { 
                status: "searching",
                pendingResponse: partnerID,
                pendingEta: 90,
                searchTimer: serverTimestamp() // Admin sieht: Wir suchen noch 3 Min weiter
            });
            alert("Sistem proverava da li ima bržih partnera (3 min)...");
        }
    };
</script>
