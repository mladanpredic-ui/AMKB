<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Balkan | SOS Alarm Center</title>
    <style>
        :root {
            --blue: #092e54;
            --red: #e63946;
            --green: #27ae60;
            --gold: #c5a059;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif;
            background: var(--blue);
            color: white;
        }
        .container { display: flex; height: 100vh; }
        .sidebar { 
            width: 300px; 
            background: linear-gradient(135deg, var(--blue), #061a30);
            padding: 20px;
            overflow-y: auto;
            border-right: 2px solid var(--gold);
        }
        .main { 
            flex: 1; 
            padding: 30px;
            overflow-y: auto;
            background: linear-gradient(135deg, #092e54, #07223d);
        }
        .alert-card {
            background: rgba(230, 57, 70, 0.15);
            border-left: 5px solid var(--red);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            animation: pulse 1s infinite;
        }
        .alert-card:hover { 
            background: rgba(230, 57, 70, 0.25);
            transform: translateX(5px);
        }
        .alert-card.resolved {
            background: rgba(39, 174, 96, 0.15);
            border-left-color: var(--green);
            animation: none;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(230, 57, 70, 0); }
        }
        .alert-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 10px;
        }
        .alert-id { font-weight: bold; font-size: 1.1rem; }
        .alert-status { 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-novo { background: var(--red); }
        .status-assigned { background: var(--gold); color: var(--blue); }
        .status-resolved { background: var(--green); }
        .alert-info { font-size: 0.9rem; opacity: 0.9; margin-bottom: 8px; }
        .alert-distance { color: var(--gold); font-weight: bold; }
        .detail-panel {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .detail-panel h3 { margin-bottom: 15px; color: var(--gold); }
        .helper-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 15px 0;
        }
        .helper-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .helper-item.assigned { background: rgba(197, 160, 89, 0.2); border-left: 3px solid var(--gold); }
        .helper-distance { font-size: 0.9rem; opacity: 0.8; }
        .helper-time { font-size: 0.85rem; color: var(--gold); }
        .btn-assign { background: var(--gold); color: var(--blue); padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-assign:hover { opacity: 0.8; }
        .btn-resolve { background: var(--green); color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .countdown { color: var(--red); font-weight: bold; font-size: 1.2rem; }
        .map-container { 
            width: 100%; 
            height: 300px; 
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--gold);
        }
        h1 { margin-bottom: 20px; }
        h2 { color: var(--gold); margin-bottom: 15px; }
        .empty { text-align: center; opacity: 0.7; padding: 40px 20px; }
        .navbar { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--gold); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <!-- SIDEBAR - Liste der aktiven Alarme -->
    <div class="sidebar">
        <div class="logo">🚨 AKB SOS</div>
        <h2>Aktive Alarme</h2>
        <div id="alarm-list">
            <div class="empty">Keine aktiven Alarme</div>
        </div>
    </div>

    <!-- MAIN - Detailansicht -->
    <div class="main">
        <div class="navbar">
            <button onclick="logout()" style="background: var(--red); color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Logout</button>
        </div>
        
        <h1>🚨 SOS ALARM CENTER</h1>
        
        <div id="detail-view" class="empty">
            Wählen Sie einen Alarm aus der Liste
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentAlarmId = null;
    let allAlarms = {};
    let allHelpers = {};
    let timeoutTimers = {};

    // ==================== HELPER FUNCTIONS ====================
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return (R * c).toFixed(1);
    }

    function findNearestHelper(alarmLat, alarmLng) {
        let nearest = null;
        let minDistance = Infinity;
        
        Object.values(allHelpers).forEach(helper => {
            if (helper.online && helper.available) {
                const dist = parseFloat(calculateDistance(alarmLat, alarmLng, helper.lat, helper.lng));
                if (dist < minDistance) {
                    minDistance = dist;
                    nearest = { ...helper, distance: dist };
                }
            }
        });
        
        return nearest;
    }

    async function assignHelperWithTimeout(alarmId, alarmData) {
        const nearest = findNearestHelper(alarmData.lat, alarmData.lng);
        
        if (!nearest) {
            console.log("Kein Helfer verfügbar");
            return;
        }

        // Zuweisung in Firebase
        await updateDoc(doc(db, "sos_calls", alarmId), {
            assigned_to: nearest.id,
            assigned_helper: nearest.name,
            assigned_distance: nearest.distance,
            status: "assigned",
            assignment_time: new Date()
        });

        // Timer starten: Nach 5 Minuten zum nächsten Helfer wechseln
        if (timeoutTimers[alarmId]) clearTimeout(timeoutTimers[alarmId]);

        timeoutTimers[alarmId] = setTimeout(async () => {
            const currentDoc = await getDoc(doc(db, "sos_calls", alarmId));
            if (currentDoc.exists() && currentDoc.data().status === "assigned") {
                // Aktueller Helfer war nicht erfolgreich, zum nächsten
                assignHelperWithTimeout(alarmId, currentDoc.data());
            }
        }, 5 * 60 * 1000); // 5 Minuten
    }

    // ==================== LISTENERS ====================
    onAuthStateChanged(auth, user => {
        if (!user) window.location.href = "admin.html";
    });

    // Höre auf alle SOS-Alarme
    onSnapshot(collection(db, "sos_calls"), async snap => {
        allAlarms = {};
        
        snap.forEach(doc => {
            allAlarms[doc.id] = { ...doc.data(), docId: doc.id };
        });

        renderAlarmList();
        if (currentAlarmId && allAlarms[currentAlarmId]) {
            renderDetailView(currentAlarmId, allAlarms[currentAlarmId]);
        }
    });

    // Höre auf alle verfügbaren Helfer
    onSnapshot(collection(db, "helpers"), snap => {
        allHelpers = {};
        
        snap.forEach(doc => {
            allHelpers[doc.id] = { ...doc.data(), id: doc.id };
        });
    });

    function renderAlarmList() {
        const list = document.getElementById('alarm-list');
        const activeAlarms = Object.values(allAlarms).filter(a => a.status !== "resolved");
        
        if (activeAlarms.length === 0) {
            list.innerHTML = '<div class="empty">Keine aktiven Alarme</div>';
            return;
        }

        list.innerHTML = activeAlarms.map(alarm => `
            <div class="alert-card ${alarm.status === 'resolved' ? 'resolved' : ''}" 
                 onclick="window.selectAlarm('${alarm.docId}')">
                <div class="alert-header">
                    <span class="alert-id">${alarm.memberID}</span>
                    <span class="alert-status status-${alarm.status}">${alarm.status.toUpperCase()}</span>
                </div>
                <div class="alert-info">👤 ${alarm.name}</div>
                <div class="alert-info">🏎️ ${alarm.plate}</div>
                <div class="alert-info alert-distance">📍 ${alarm.distance_from_assigned || 'Berechnung...'}km</div>
                ${alarm.assigned_helper ? `<div class="alert-info">✓ ${alarm.assigned_helper}</div>` : ''}
            </div>
        `).join('');
    }

    window.selectAlarm = (alarmId) => {
        currentAlarmId = alarmId;
        renderDetailView(alarmId, allAlarms[alarmId]);
    };

    async function renderDetailView(alarmId, alarm) {
        const helpers = Object.values(allHelpers)
            .map(h => ({ 
                ...h, 
                distance: calculateDistance(alarm.lat, alarm.lng, h.lat, h.lng) 
            }))
            .sort((a, b) => parseFloat(a.distance) - parseFloat(b.distance));

        const assignmentTime = alarm.assignment_time?.toDate?.() || new Date(alarm.assignment_time);
        const elapsed = Math.floor((new Date() - assignmentTime) / 1000);
        const remaining = Math.max(0, 300 - elapsed);

        const view = document.getElementById('detail-view');
        view.innerHTML = `
            <div class="detail-panel">
                <h3>📍 ALARM DETAILS</h3>
                
                <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 6px; margin-bottom: 15px;">
                    <div><strong>ID:</strong> ${alarm.memberID}</div>
                    <div><strong>Name:</strong> ${alarm.name}</div>
                    <div><strong>Fahrzeug:</div> ${alarm.plate}</div>
                    <div><strong>Koordinaten:</strong> ${alarm.lat}, ${alarm.lng}</div>
                </div>

                <div class="map-container">
                    📍 Karte: ${alarm.lat.toFixed(4)}, ${alarm.lng.toFixed(4)}
                </div>

                ${alarm.assigned_helper ? `
                    <div style="background: rgba(197, 160, 89, 0.15); padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 3px solid var(--gold);">
                        <div><strong>✓ Zugewiesen an:</strong> ${alarm.assigned_helper}</div>
                        <div><strong>Entfernung:</strong> ${alarm.assigned_distance}km</div>
                        <div><strong>⏱️ Timeout in:</strong> <span class="countdown">${Math.floor(remaining/60)}:${String(remaining%60).padStart(2, '0')}</span></div>
                    </div>
                ` : ''}

                <h3 style="margin-top: 20px;">🚗 VERFÜGBARE HELFER (nach Entfernung)</h3>
                <div class="helper-list">
                    ${helpers.length === 0 ? '<div style="opacity: 0.6;">Keine Helfer verfügbar</div>' : 
                      helpers.map((h, idx) => `
                        <div class="helper-item ${h.id === alarm.assigned_to ? 'assigned' : ''}">
                            <div>
                                <div><strong>${idx + 1}. ${h.name}</strong></div>
                                <div class="helper-distance">${h.distance}km entfernt</div>
                            </div>
                            ${h.id !== alarm.assigned_to ? `
                                <button class="btn-assign" onclick="window.assignHelper('${alarmId}', '${h.id}')">Zuweisen</button>
                            ` : '<span style="color: var(--gold);">✓ Aktuell zugewiesen</span>'}
                        </div>
                    `).join('')}
                </div>

                <button class="btn-resolve" onclick="window.resolveAlarm('${alarmId}')">✓ ALARM GELÖST</button>
            </div>
        `;

        // Countdown aktualisieren
        if (alarm.assigned_helper && remaining > 0) {
            setTimeout(() => renderDetailView(alarmId, alarm), 1000);
        }
    }

    window.assignHelper = async (alarmId, helperId) => {
        const helper = allHelpers[helperId];
        const alarm = allAlarms[alarmId];
        
        await updateDoc(doc(db, "sos_calls", alarmId), {
            assigned_to: helperId,
            assigned_helper: helper.name,
            assigned_distance: calculateDistance(alarm.lat, alarm.lng, helper.lat, helper.lng),
            status: "assigned",
            assignment_time: new Date()
        });

        // 5-Minuten-Timer starten
        assignHelperWithTimeout(alarmId, { ...alarm, assigned_to: helperId });
    };

    window.resolveAlarm = async (alarmId) => {
        if (confirm("Diesen Alarm als gelöst markieren?")) {
            await updateDoc(doc(db, "sos_calls", alarmId), {
                status: "resolved",
                resolved_at: new Date()
            });
            if (timeoutTimers[alarmId]) clearTimeout(timeoutTimers[alarmId]);
            currentAlarmId = null;
            document.getElementById('detail-view').innerHTML = '<div class="empty">Wählen Sie einen Alarm aus der Liste</div>';
        }
    };

    window.logout = () => {
        signOut(auth).then(() => window.location.href = "admin.html");
    };

    // getDoc für 5-Minuten-Logik
    import { getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    window.getDoc = getDoc;
</script>

</body>
</html>
