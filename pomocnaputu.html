<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AK Balkan | Radni Nalog</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --dark-bg: #061f3a; --green: #27ae60; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; color: #333; }
        
        .driver-header { background: var(--akb-blue); color: var(--gold); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); }
        .driver-badge { background: var(--dark-bg); color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; margin-top: 5px; display: inline-block; }
        
        .status-bar { background: var(--gold); color: var(--akb-blue); padding: 10px; font-weight: bold; text-align: center; text-transform: uppercase; }
        .info-card { background: white; margin: 15px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .info-card h3 { margin-top: 0; color: var(--akb-blue); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #fafafa; }
        .label { color: #888; font-size: 0.9rem; }
        .value { font-weight: bold; color: #222; }

        .action-btn { 
            display: block; width: 90%; margin: 20px auto; padding: 18px; 
            border-radius: 10px; text-align: center; text-decoration: none; font-weight: bold; font-size: 1.1rem; 
            border: none; cursor: pointer; transition: 0.3s;
        }
        .btn-call { background: var(--green); color: white; margin-bottom: 10px; }
        .btn-nav { background: var(--akb-blue); color: white; }
        .btn-finish { background: #555; color: white; margin-top: 40px; }
    </style>
</head>
<body>

<div class="driver-header">
    <h2 style="margin:0;">AK BALKAN</h2>
    <div id="driver-info" class="driver-badge">Vozač: Učitavanje...</div>
</div>

<div id="status-tag" class="status-bar">Učitavanje naloga...</div>

<div class="info-card">
    <h3>Podaci o Članu</h3>
    <div class="detail-row"><span class="label">Ime i Prezime:</span> <span class="value" id="m-name">...</span></div>
    <div class="detail-row"><span class="label">Telefon:</span> <span class="value" id="m-phone">...</span></div>
    <div class="detail-row"><span class="label">Vozilo / Tablice:</span> <span class="value" id="m-plate">...</span></div>
</div>

<div class="info-card">
    <h3>Lokacija Kvara</h3>
    <p id="m-loc-text" style="font-size: 0.9rem; color: #666;">Čekam GPS podatke...</p>
    <button class="action-btn btn-nav" id="btn-google-maps">📍 OTVORI NAVIGACIJU</button>
</div>

<div style="text-align: center;">
    <button class="action-btn btn-call" id="btn-phone-call">📞 POZOVI ČLANA</button>
</div>

<button class="action-btn btn-finish" id="btn-complete">OZNAČI KAO ZAVRŠENO</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Parameter aus der URL lesen: ?id=AUFTRAG_ID&driver=FAHRER_NAME
    const urlParams = new URLSearchParams(window.location.search);
    const callId = urlParams.get('id');
    const driverId = urlParams.get('driver') || "Nepoznat vozač";

    document.getElementById('driver-info').innerText = "Vozač: " + driverId;

    if (!callId) {
        document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>Nalog nije pronađen oder fehlt ID.</h2>";
    } else {
        onSnapshot(doc(db, "sos_calls", callId), (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                
                // Falls der Auftrag bereits einem anderen Fahrer gehört (Sicherheit)
                if (data.assignedDriver && data.assignedDriver !== driverId) {
                    document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>Ovaj nalog je preuzeo drugi vozač.</h2>";
                    return;
                }

                document.getElementById('m-name').innerText = data.name;
                document.getElementById('m-phone').innerText = data.phone || "/";
                document.getElementById('m-plate').innerText = data.plate || "/";
                document.getElementById('status-tag').innerText = "Status: " + (data.status || "PRIMLJENO");

                document.getElementById('btn-phone-call').onclick = () => { window.location.href = "tel:" + data.phone; };

                if (data.lat && data.lng) {
                    const mapUrl = `https://www.google.com/maps?q=${data.lat},${data.lng}`;
                    document.getElementById('btn-google-maps').onclick = () => { window.open(mapUrl, '_blank'); };
                    document.getElementById('m-loc-text').innerText = "Lokacija dostupna.";
                }
            }
        });
    }

    document.getElementById('btn-complete').onclick = async () => {
        if(confirm("Potvrdi završetak intervencije?")) {
            await updateDoc(doc(db, "sos_calls", callId), { 
                status: "završeno",
                completedBy: driverId,
                finishedAt: serverTimestamp()
            });
            alert("Intervencija uspešno završena.");
        }
    };
</script>
</body>
</html>
