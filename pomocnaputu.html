<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomoć na putu | AK Balkan</title>
    <style>
        body { background: #092e54; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .alarm-box { background: #a52a2a; padding: 30px; border-radius: 15px; margin-top: 20px; display: none; border: 4px solid white; }
        .info-card { background: white; color: #333; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: left; }
        .status-badge { display: inline-block; padding: 10px 20px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; }
        .btn-accept { background: #27ae60; color: white; border: none; padding: 20px; width: 100%; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #login-area { background: white; color: #333; padding: 30px; border-radius: 10px; max-width: 400px; margin: auto; }
    </style>
</head>
<body>

<div id="login-area">
    <h2>VOZAČ PRIJAVA</h2>
    <input type="email" id="driver-email" placeholder="Email vozača" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="password" id="driver-pass" placeholder="Lozinka" style="width:100%; padding:10px; margin-bottom:10px;">
    <button onclick="driverLogin()" style="width:100%; padding:10px; background:#092e54; color:white; border:none;">PRIJAVI SE</button>
</div>

<div id="driver-dashboard" style="display:none;">
    <h1>🚚 ŠLEP SLUŽBA - AKTIVNA</h1>
    <p id="driver-info"></p>
    <button onclick="driverLogout()" style="background:none; color:white; border:1px solid white; padding:5px;">Odjavi se</button>

    <div id="sos-alarm" class="alarm-box">
        <h2 style="margin:0;">🚨 NOVI SOS POZIV!</h2>
        <div class="info-card">
            <div id="status-display" class="status-badge">PROVERA ČLANSTVA...</div>
            <p><strong>Klijent:</strong> <span id="cust-name"></span></p>
            <p><strong>Vozilo:</strong> <span id="cust-plate"></span></p>
            <p><strong>Problem:</strong> <span id="cust-problem"></span></p>
            <p><strong>Lokacija:</strong> <span id="cust-loc"></span></p>
            <button class="btn-accept" onclick="acceptMission()">PRIHVATI I KRENI</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Login Funktionen
    window.driverLogin = () => {
        const e = document.getElementById('driver-email').value;
        const p = document.getElementById('driver-pass').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("Greška: " + err.message));
    };
    window.driverLogout = () => signOut(auth);

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('driver-dashboard').style.display = 'block';
            document.getElementById('driver-info').innerText = "Vozač: " + user.email;
            listenForAlarms();
        } else {
            document.getElementById('login-area').style.display = 'block';
            document.getElementById('driver-dashboard').style.display = 'none';
        }
    });

    let currentCallId = null;

    function listenForAlarms() {
        onSnapshot(collection(db, "sos_calls"), (snap) => {
            snap.forEach(async (dSnap) => {
                const call = dSnap.data();
                if(call.status === "open") {
                    currentCallId = dSnap.id;
                    
                    // Prüfen ob Mitglied aktiv ist
                    const uQ = query(collection(db, "users"), where("memberID", "==", call.memberID));
                    const uSnap = await getDocs(uQ);
                    let active = false;
                    if(!uSnap.empty) active = uSnap.docs[0].data().status === "AKTIV";

                    document.getElementById('sos-alarm').style.display = 'block';
                    document.getElementById('cust-name').innerText = call.name;
                    document.getElementById('cust-plate').innerText = call.licensePlate;
                    document.getElementById('cust-problem').innerText = call.problem;
                    document.getElementById('cust-loc').innerText = call.location || "Vidi mapu";
                    
                    const st = document.getElementById('status-display');
                    st.innerText = active ? "✅ ČLAN AKTIVAN" : "⚠️ NIJE PLAĆENO";
                    st.style.background = active ? "#27ae60" : "#000";
                    st.style.color = "white";

                    let audio = new Audio('alarm.mp3');
                    audio.play();
                }
            });
        });
    }

    window.acceptMission = async () => {
        if(currentCallId) {
            await updateDoc(doc(db, "sos_calls", currentCallId), { 
                status: "in_progress",
                driver: auth.currentUser.email 
            });
            alert("Intervencija prihvaćena!");
            document.getElementById('sos-alarm').style.display = 'none';
        }
    };
</script>
</body>
</html>
