<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoKlub Balkan | Oficijalna Stranica</title>
    <style>
        :root {
            --akb-blue: #092e54;
            --akb-red: #a52a2a;
            --gold: #c5a059;
            --light: #f4f7f6;
            --footer-bg: #1a1a1a;
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background: var(--akb-blue); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { color: white; font-weight: bold; font-size: 1.5rem; cursor: pointer; text-decoration: none; }
        
        .hero { 
            background: linear-gradient(rgba(9, 46, 84, 0.7), rgba(9, 46, 84, 0.7)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80'); 
            background-size: cover; background-position: center; height: 50vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 0 20px; 
        }

        .btn-sos { background: var(--akb-red); color: white; border: none; padding: 20px 45px; font-size: 1.6rem; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(165,42,42,0.5); margin: 20px 0; transition: 0.3s; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .pricing { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px 5%; max-width: 1200px; margin: auto; }
        .package { background: white; padding: 30px; border-radius: 15px; border-top: 5px solid var(--gold); text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .price { font-size: 1.8rem; font-weight: bold; margin: 15px 0; color: var(--akb-blue); }
        .btn-main { background: var(--akb-blue); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        footer { background: var(--footer-bg); color: white; padding: 40px 5%; margin-top: auto; border-top: 4px solid var(--gold); }
        .disclaimer-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; font-size: 11px; color: #888; text-align: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        
        #admin-login-area { display: none; margin-top: 15px; max-width: 250px; margin-left: auto; margin-right: auto; background: #222; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AK BALKAN</div>
        <div>
            <button onclick="window.location.href='user.html'" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 15px; border-radius:5px; cursor:pointer;">PROFIL</button>
        </div>
    </nav>

    <div class="hero">
        <h1>AutoKlub Balkan</h1>
        <p>"Više od pomoći na putu."</p>
        <button class="btn-sos" onclick="sendSOS()">SOS</button>
    </div>

    <div class="pricing">
        <div class="package"><h3>MOTO</h3><p class="price">3.500 RSD</p><button class="btn-main">ODABERI</button></div>
        <div class="package" style="border-color: var(--akb-blue);"><h3>BAZA</h3><p class="price">5.900 RSD</p><button class="btn-main">ODABERI</button></div>
        <div class="package"><h3>EVROPA VIP</h3><p class="price">11.800 RSD</p><button class="btn-main">ODABERI</button></div>
    </div>

    <footer>
        <div class="disclaimer-box">
            <strong>NAPOMENA:</strong> Svi podaci su zaštićeni. Sistem koristi <strong>Mladjan Cloud Control</strong> v2.0. 
            SOS pozivi se automatski prosleđuju dežurnom dispičeru.
        </div>

        <div style="text-align: center;">
            <button onclick="document.getElementById('admin-login-area').style.display='block'" style="background: none; border: none; color: #444; font-size: 10px; cursor: pointer;">Partner Login</button>
            
            <div id="admin-login-area">
                <input type="password" id="internal-pass" placeholder="Lozinka (000000)" style="width: 100%; padding: 10px; border-radius: 8px; border: none; margin-bottom: 10px; color: black; text-align: center;">
                <button id="login-btn" style="background: var(--akb-red); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold;">ULAZ</button>
            </div>
        </div>

        <div style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: #555;">
            &copy; 2026 AutoKlub Balkan | <span style="color: var(--gold);">DISPIČER: MLADJAN</span>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
            authDomain: "autoklub-balkan.firebaseapp.com",
            projectId: "autoklub-balkan",
            storageBucket: "autoklub-balkan.firebasestorage.app",
            messagingSenderId: "499546593125",
            appId: "1:499546593125:web:7823602797b37e8338b38c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Login Funktion
        document.getElementById('login-btn').addEventListener('click', async () => {
            const pass = document.getElementById('internal-pass').value;
            try {
                const docRef = doc(db, "internal_accounts", "admin_mladjan");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists() && docSnap.data().password === pass) {
                    window.location.href = 'admin.html';
                } else {
                    alert("Pogrešna lozinka!");
                }
            } catch (e) {
                alert("Greška: Proverite Firebase Rules!");
            }
        });

        window.sendSOS = function() { alert("SOS Signal poslat Mladjanu!"); };
    </script>
</body>
</html>
