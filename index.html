<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoKlub Balkan | Master</title>
    <style>
        :root { --akb-blue: #092e54; --akb-red: #a52a2a; --gold: #c5a059; --light: #f8f9fa; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: var(--dark); }

        /* HEADER & NAV */
        nav { 
            background: var(--akb-blue); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--gold);
        }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .lang-select { background: #061f3a; color: var(--gold); border: 1px solid var(--gold); padding: 6px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; font-weight: bold; }
        .user-login { color: white; text-decoration: none; font-size: 0.85rem; font-weight: bold; border: 1px solid white; padding: 6px 12px; border-radius: 5px; }

        /* HERO */
        .hero { 
            background: linear-gradient(rgba(9,46,84,0.8), rgba(9,46,84,0.8)), url('https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?q=80&w=1470');
            background-size: cover; background-position: center; color: white; padding: 60px 10%; text-align: center;
        }
        .btn-cta { background: var(--akb-red); color: white; padding: 18px 30px; border: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 100%; max-width: 300px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* PACKAGES */
        .container { padding: 30px 5%; }
        .package-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--akb-blue); }
        .card.premium { border-top-color: var(--gold); border-width: 8px; transform: scale(1.02); }
        .price { font-size: 2.2rem; font-weight: bold; color: var(--akb-blue); margin: 10px 0; }

        /* FOOTER (BUSINESS) */
        footer { background: var(--dark); color: white; padding: 40px 5%; margin-top: 50px; text-align: center; border-top: 3px solid var(--gold); }
        .biz-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 0.8rem; opacity: 0.7; }
        .biz-links a { color: white; text-decoration: none; text-transform: uppercase; }

        @media (min-width: 768px) { .package-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<nav>
    <a href="#" style="color:white; text-decoration:none; font-weight:bold; letter-spacing:1px;">👑 AK BALKAN</a>
    <div class="nav-right">
        <select class="lang-select" onchange="updateContent(this.value)">
            <option value="sr_lat">SRB (Lat)</option>
            <option value="sr_cyr">СРБ (Ћир)</option>
            <option value="de">DE</option>
            <option value="en">EN</option>
            <option value="ru">RU</option>
        </select>
        <a href="user.html" class="user-login" id="txt-login">PRIJAVA</a>
    </div>
</nav>

<section class="hero">
    <h1 id="txt-title">Sigurnost na putu širom Balkana</h1>
    <p id="txt-desc">Asistencija kojoj verujete. Pridružite se hiljadama vozača.</p>
    <button class="btn-cta" id="txt-cta" onclick="location.href='vertrag.html'">POSTANI ČLAN</button>
</section>

<div class="container">
    <h2 style="text-align:center;" id="txt-pkg-head">Naši Paketi</h2>
    <div class="package-grid">
        <div class="card"><h3 id="txt-p1">MOTO</h3><div class="price">39€</div><p id="txt-p1d">Srbija asistencija</p></div>
        <div class="card premium"><h3 id="txt-p2">PREMIUM</h3><div class="price" style="color:var(--gold)">159€</div><p id="txt-p2d">Evropa + Balkan</p></div>
        <div class="card"><h3 id="txt-p3">AUTO</h3><div class="price">89€</div><p id="txt-p3d">Srbija + Region</p></div>
    </div>
</div>

<footer>
    <div class="biz-links">
        <a href="admin.html">Founder</a> | <a href="partnerweb.html">Partneri</a>
    </div>
    <p style="opacity: 0.5; font-size: 0.75rem;">&copy; 2026 AutoKlub Balkan d.o.o. | PIB: 102345678</p>
</footer>

<script>
    const translations = {
        sr_lat: { login: "PRIJAVA", title: "Sigurnost na putu širom Balkana", desc: "Asistencija kojoj verujete.", cta: "POSTANI ČLAN", pkg: "Naši Paketi", p1: "MOTO", p1d: "Srbija asistencija", p2: "PREMIUM", p2d: "Evropa + Balkan", p3: "AUTO", p3d: "Srbija + Region" },
        sr_cyr: { login: "ПРИЈАВА", title: "Сигурност на путу широм Балкана", desc: "Асистенција којој верујете.", cta: "ПОСТАНИ ЧЛАН", pkg: "Наши Пакети", p1: "МОТО", p1d: "Србија асистенција", p2: "ПРЕМИУМ", p2d: "Европа + Балкан", p3: "АУТО", p3d: "Србија + Регион" },
        de: { login: "LOGIN", title: "Sicherheit auf allen Wegen", desc: "Pannenhilfe, der Sie vertrauen.", cta: "MITGLIED WERDEN", pkg: "Unsere Pakete", p1: "MOTO", p1d: "Serbien Pannenhilfe", p2: "PREMIUM", p2d: "Europa + Balkan", p3: "AUTO", p3d: "Serbien + Region" },
        en: { login: "LOGIN", title: "Safety Across the Balkans", desc: "Assistance you can trust.", cta: "JOIN NOW", pkg: "Our Packages", p1: "MOTO", p1d: "Serbia Assistance", p2: "PREMIUM", p2d: "Europe + Balkans", p3: "AUTO", p3d: "Serbia + Region" },
        ru: { login: "ВХОД", title: "Безопасность на дорогах Балкан", desc: "Помощь, которой доверяют.", cta: "СТАТЬ ЧЛЕНОМ", pkg: "Наши пакеты", p1: "МОТО", p1d: "Сербия помощь", p2: "ПРЕМИУМ", p2d: "Европа + Балканы", p3: "АВТО", p3d: "Сербия + Регион" }
    };

    function updateContent(lang) {
        const t = translations[lang];
        document.getElementById('txt-login').innerText = t.login;
        document.getElementById('txt-title').innerText = t.title;
        document.getElementById('txt-desc').innerText = t.desc;
        document.getElementById('txt-cta').innerText = t.cta;
        document.getElementById('txt-pkg-head').innerText = t.pkg;
        document.getElementById('txt-p1').innerText = t.p1; document.getElementById('txt-p1d').innerText = t.p1d;
        document.getElementById('txt-p2').innerText = t.p2; document.getElementById('txt-p2d').innerText = t.p2d;
        document.getElementById('txt-p3').innerText = t.p3; document.getElementById('txt-p3d').innerText = t.p3d;
    }
</script>
</body>
</html>
