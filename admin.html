<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | AK Balkan</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --red: #a52a2a; --dark: #061f3a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; }
        .header { background: var(--akb-blue); padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        
        .section-title { color: var(--gold); border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding-bottom: 10px; margin-top: 40px; }
        
        /* Partner Management Form */
        .admin-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a2a3a; color: white; }
        .btn-gold { background: var(--gold); color: var(--akb-blue); border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* SOS Monitor */
        .call-card { background: white; color: #333; margin-bottom: 15px; border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid var(--gold); }
        .info h3 { margin: 0; color: var(--akb-blue); }
        .btn-dispatch { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-maps { background: #27ae60; color: white; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-size: 0.9rem; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>AK BALKAN - MASTER ADMIN</h1>
</div>

<div class="container">
    <h2 class="section-title">Upravljanje Partnerima (Šlep Službe)</h2>
    <div class="admin-card">
        <p>Kreiraj novi nalog za partnera:</p>
        <div class="form-grid">
            <input type="text" id="p-name" placeholder="Naziv Službe (npr. Šlep Brzi)">
            <input type="text" id="p-city" placeholder="Grad / Region">
            <input type="text" id="p-pass" placeholder="Lozinka za partnera">
        </div>
        <button class="btn-gold" style="margin-top: 15px; width: 200px;" onclick="createNewPartner()">KREIRAJ PARTNERA</button>
    </div>

    <h2 class="section-title">Live SOS Monitor</h2>
    <div id="sos-list">
        <p>Tražim aktivne pozive...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. PARTNER KREIEREN
    window.createNewPartner = async () => {
        const name = document.getElementById('p-name').value;
        const city = document.getElementById('p-city').value;
        const pass = document.getElementById('p-pass').value;
        
        if(!name || !pass) { alert("Popunite naziv i lozinku!"); return; }

        const pID = "P-" + Math.floor(1000 + Math.random() * 9000);

        try {
            await setDoc(doc(db, "partners", pID), {
                partnerName: name,
                city: city,
                password: pass,
                active: true,
                createdAt: serverTimestamp()
            });
            alert("Partner kreiran! ID za prijavu: " + pID);
            document.getElementById('p-name').value = "";
            document.getElementById('p-pass').value = "";
        } catch (e) { alert("Greška: " + e.message); }
    };

    // 2. SOS CALLS LIVE MONITOR
    onSnapshot(collection(db, "sos_calls"), (snapshot) => {
        const list = document.getElementById('sos-list');
        list.innerHTML = "";
        
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const card = document.createElement('div');
            card.className = "call-card";
            
            let mapsBtn = data.lat ? `<a href="https://www.google.com/maps?q=${data.lat},${data.lng}" target="_blank" class="btn-maps">📍 VIDI NA MAPI</a>` : "";

            card.innerHTML = `
                <div class="info">
                    <h3>👤 ${data.name}</h3>
                    <p>📞 Tel: ${data.phone || 'N/A'} | ID: ${data.customerNumber || 'N/A'}</p>
                    <p>🛠 Problem: <strong>${data.problem || 'SOS'}</strong></p>
                    ${mapsBtn}
                </div>
                <div>
                    ${data.status === 'offen' ? 
                        `<button class="btn-dispatch" onclick="sendToPartners('${docSnap.id}')">PROSLEDI PARTNERIMA 📡</button>` : 
                        `<span style="color:green; font-weight:bold">U OBRADI ✅</span>`
                    }
                </div>
            `;
            list.appendChild(card);
        });
    });

    window.sendToPartners = async (id) => {
        const docRef = doc(db, "sos_calls", id);
        await updateDoc(docRef, { status: "searching" });
        alert("Poziv prosleđen svim partnerima!");
    };
</script>
</body>
</html>
