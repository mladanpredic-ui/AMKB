<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder Control | AK Balkan</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --red: #a52a2a; }
        body { font-family: 'Segoe UI', sans-serif; background: #061f3a; color: white; margin: 0; }
        .header { background: var(--akb-blue); padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .call-card { background: white; color: #333; margin-bottom: 15px; border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid var(--gold); }
        .info h3 { margin: 0; color: var(--akb-blue); }
        .status-badge { background: #eee; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .btn-dispatch { background: var(--red); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-dispatch:hover { background: #800000; }
        .no-calls { text-align: center; opacity: 0.5; margin-top: 50px; }
    </style>
</head>
<body>

<div class="header">
    <h1>👑 AK BALKAN - FOUNDER PANEL</h1>
    <p>Pregled svih SOS zahteva u realnom vremenu</p>
</div>

<div class="container">
    <div id="admin-list">
        <p class="no-calls">Skeniranje baze podataka...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Slušamo SVE pozive
    onSnapshot(collection(db, "sos_calls"), (snapshot) => {
        const list = document.getElementById('admin-list');
        if (snapshot.empty) {
            list.innerHTML = '<p class="no-calls">Trenutno nema aktivnih zahteva.</p>';
            return;
        }

        list.innerHTML = "";
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const card = document.createElement('div');
            card.className = 'call-card';
            
            // Boja badge-a u zavisnosti od statusa
            let statusColor = data.status === 'offen' ? '#a52a2a' : '#27ae60';
            let statusText = data.status === 'offen' ? 'NOVO / NEPOSLATO' : 'PROSLEĐENO PARTNERIMA';

            card.innerHTML = `
                <div class="info">
                    <h3>👤 ${data.name || 'Nepoznato'}</h3>
                    <p>🛠 Kvar: <strong>${data.problem}</strong></p>
                    <span class="status-badge" style="color: white; background: ${statusColor}">${statusText}</span>
                </div>
                <div>
                    ${data.status === 'offen' ? 
                        `<button class="btn-dispatch" onclick="sendToPartners('${docSnap.id}')">POŠALJI PARTNERIMA 📡</button>` : 
                        `<button class="btn-dispatch" style="background:#666" disabled>POSLATO</button>`
                    }
                </div>
            `;
            list.appendChild(card);
        });
    });

    window.sendToPartners = async (id) => {
        const docRef = doc(db, "sos_calls", id);
        try {
            await updateDoc(docRef, { 
                status: "searching", // Ovo aktivira alarm kod partnera
                dispatchedAt: serverTimestamp() 
            });
            alert("Poziv je uspešno prosleđen svim partnerima!");
        } catch (e) {
            alert("Greška: " + e.message);
        }
    };
</script>

</body>
</html>
