<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Founder Control | AK Balkan</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --red: #a52a2a; --dark-bg: #061f3a; --success: #28a745; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: white; margin: 0; padding-bottom: 50px; }
        .header { background: var(--akb-blue); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); }
        .header h1 { font-size: 1.2rem; margin: 5px 0; }
        .header p { font-size: 0.8rem; opacity: 0.8; }

        /* Dashboard Stats - Mobil optimiert */
        .stats-bar { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* 2 Spalten auf Mobilgeräten */
            gap: 10px; 
            padding: 15px; 
            max-width: 1200px; 
            margin: auto; 
        }
        .stat-card { background: rgba(255,255,255,0.08); padding: 12px; border-radius: 8px; text-align: center; border-bottom: 3px solid var(--gold); }
        .stat-card h4 { margin: 0; font-size: 9px; text-transform: uppercase; color: #aaa; }
        .stat-card p { margin: 5px 0 0; font-size: 1.1rem; font-weight: bold; color: var(--gold); }

        /* Navigation */
        .admin-nav { display: flex; justify-content: center; gap: 5px; margin: 10px 0 20px; padding: 0 10px; }
        .nav-btn { flex: 1; background: transparent; border: 1px solid var(--gold); color: white; padding: 10px 5px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .nav-btn.active { background: var(--gold); color: var(--akb-blue); font-weight: bold; }

        .container { padding: 0 15px; max-width: 1200px; margin: auto; }
        .list-section { display: none; }
        .active-section { display: block; }
        
        /* Karten-Design für Mobile */
        .data-card { 
            background: white; color: #333; margin-bottom: 15px; border-radius: 12px; padding: 15px; 
            display: flex; flex-direction: column; /* Alles untereinander auf Mobil */
            gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        .info h3 { margin: 0; font-size: 1.1rem; color: var(--akb-blue); }
        .info p { margin: 4px 0; font-size: 0.9rem; color: #555; line-height: 1.3; }
        
        /* Badges & Buttons */
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .badge-filter { background: #444; color: white; border: none; padding: 8px 15px; margin-right: 5px; border-radius: 20px; }
        .badge-filter.active-filter { background: var(--gold); color: var(--akb-blue); }

        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: bold; cursor: pointer; background: #eee; color: #333; }
        
        /* Spezieller Style für GRAWE */
        .type-grawe { border-top: 5px solid var(--success); }

        /* Media Query für größere Bildschirme (Tablets) */
        @media (min-width: 600px) {
            .stats-bar { grid-template-columns: repeat(4, 1fr); }
            .data-card { flex-direction: row; justify-content: space-between; align-items: center; }
            .btn-action { width: auto; min-width: 120px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>👑 AK BALKAN FOUNDER</h1>
    <p>Upravljanje sistemom u realnom vremenu</p>
</div>

<div class="stats-bar">
    <div class="stat-card"><h4>Članova</h4><p>1,248</p></div>
    <div class="stat-card"><h4>Partneri</h4><p>42</p></div>
    <div class="stat-card"><h4>Promet</h4><p>18.4k €</p></div>
    <div class="stat-card"><h4>SOS</h4><p style="color:var(--red)">3</p></div>
</div>

<div class="container">
    <div class="admin-nav">
        <button class="nav-btn active" onclick="switchTab('sos', this)">SOS</button>
        <button class="nav-btn" onclick="switchTab('members', this)">ČLANOVI</button>
        <button class="nav-btn" onclick="switchTab('partners', this)">PARTNERI</button>
    </div>

    <div id="sos" class="list-section active-section">
        <div class="data-card">
            <div class="info">
                <span class="badge" style="background:var(--red); color:white;">HITNO</span>
                <h3>Marko Petrović</h3>
                <p>📍 Autokomanda, Beograd<br>🚗 Audi A4 (BG-123-TX)</p>
            </div>
            <button class="btn-action" style="background:var(--red); color:white;">POŠALJI ŠLEP</button>
        </div>
    </div>

    <div id="partners" class="list-section">
        <div style="overflow-x: auto; white-space: nowrap; margin-bottom: 15px; padding-bottom: 5px;">
            <button class="badge-filter active-filter" onclick="filterPartners('all', this)">Svi</button>
            <button class="badge-filter" onclick="filterPartners('grawe', this)">GRAWE</button>
            <button class="badge-filter" onclick="filterPartners('slep', this)">Šlep</button>
            <button class="badge-filter" onclick="filterPartners('tuning', this)">Tuning</button>
        </div>

        <div class="data-card partner-item type-grawe">
            <div class="info">
                <span class="badge" style="background:var(--success); color:white;">Premium Partner</span>
                <h3>GRAWE Osiguranje</h3>
                <p>Popust: <strong>-15% Kasko</strong></p>
            </div>
            <button class="btn-action" style="background:var(--akb-blue); color:white;">KONTAKT</button>
        </div>

        <div class="data-card partner-item type-tuning">
            <div class="info">
                <span class="badge" style="background:var(--red); color:white;">Tuning</span>
                <h3>Stage 1 Performance</h3>
                <p>📍 Zemun | Chip & Dyno</p>
            </div>
            <button class="btn-action">PROFIL</button>
        </div>
    </div>
</div>

<script>
    function switchTab(tabId, btn) {
        document.querySelectorAll('.list-section').forEach(sec => sec.classList.remove('active-section'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active-section');
        btn.classList.add('active');
    }

    function filterPartners(category, btn) {
        document.querySelectorAll('.badge-filter').forEach(b => b.classList.remove('active-filter'));
        btn.classList.add('active-filter');
        const items = document.querySelectorAll('.partner-item');
        items.forEach(item => {
            if (category === 'all' || item.classList.contains('type-' + category)) {
                item.style.display = 'flex';
            } else {
                item.style.display = 'none';
            }
        });
    }
</script>
</body>
</html>
