<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Founder Control | AK Balkan</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --red: #a52a2a; --dark-bg: #061f3a; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: white; margin: 0; padding-bottom: 50px; }
        .header { background: var(--akb-blue); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); }
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; max-width: 1200px; margin: auto; }
        .stat-card { background: rgba(255,255,255,0.08); padding: 12px; border-radius: 8px; text-align: center; border-bottom: 3px solid var(--gold); }
        .stat-card h4 { margin: 0; font-size: 9px; text-transform: uppercase; color: #aaa; }
        .stat-card p { margin: 5px 0 0; font-size: 1.1rem; font-weight: bold; color: var(--gold); }
        .admin-nav { display: flex; justify-content: center; gap: 5px; margin: 10px 0 20px; padding: 0 10px; }
        .nav-btn { flex: 1; background: transparent; border: 1px solid var(--gold); color: white; padding: 10px 5px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .nav-btn.active { background: var(--gold); color: var(--akb-blue); font-weight: bold; }
        .container { padding: 0 15px; max-width: 1200px; margin: auto; }
        .list-section { display: none; }
        .active-section { display: block; }
        .data-card { background: white; color: #333; margin-bottom: 15px; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .info h3 { margin: 0; font-size: 1.1rem; color: var(--akb-blue); }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: bold; cursor: pointer; background: var(--akb-blue); color: white; }
        @media (min-width: 600px) { .stats-bar { grid-template-columns: repeat(4, 1fr); } .data-card { flex-direction: row; justify-content: space-between; align-items: center; } .btn-action { width: auto; min-width: 150px; } }
    </style>
</head>
<body>

<div class="header">
    <h1>👑 AK BALKAN FOUNDER</h1>
    <p>Upravljanje sistemom u realnom vremenu</p>
</div>

<div class="stats-bar">
    <div class="stat-card"><h4>Članova</h4><p id="stat-members">1,248</p></div>
    <div class="stat-card"><h4>Partneri</h4><p>42</p></div>
    <div class="stat-card"><h4>Promet</h4><p>18.4k €</p></div>
    <div class="stat-card"><h4>SOS</h4><p id="stat-sos" style="color:var(--red)">0</p></div>
</div>

<div class="container">
    <div class="admin-nav">
        <button class="nav-btn active" id="btn-sos" onclick="switchTab('sos-list', this)">SOS</button>
        <button class="nav-btn" onclick="switchTab('partners', this)">PARTNERI</button>
    </div>

    <div id="sos-list" class="list-section active-section">
        <p style="text-align:center; opacity:0.5;" id="loading-msg">Tražim aktivne pozive...</p>
    </div>

    <div id="partners" class="list-section">
        <div class="data-card">
            <div class="info"><h3>GRAWE Osiguranje</h3><p>-15% Kasko</p></div>
            <button class="btn-action">KONTAKT</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // LIVE SOS UPDATE
    const q = query(collection(db, "sos_calls"), where("status", "==", "offen"));

    onSnapshot(q, (snapshot) => {
        const container = document.getElementById('sos-list');
        const sosStat = document.getElementById('stat-sos');
        document.getElementById('loading-msg').style.display = 'none';
        
        sosStat.innerText = snapshot.size;
        container.innerHTML = "";

        if (snapshot.empty) {
            container.innerHTML = '<p style="text-align:center; opacity:0.5;">Trenutno nema aktivnih SOS poziva.</p>';
        }

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            container.innerHTML += `
                <div class="data-card">
                    <div class="info">
                        <span class="badge" style="background:var(--red); color:white;">HITNO</span>
                        <h3>${data.name}</h3>
                        <p>📍 Problem: ${data.problem}</p>
                    </div>
                    <button class="btn-action" style="background:var(--red);" onclick="closeCall('${docSnap.id}')">ZAVRŠI INTERVENCIJU</button>
                </div>`;
        });
    });

    // Funktion zum Abschließen eines Rufs
    window.closeCall = async (id) => {
        if(confirm("Da li je intervencija završena?")) {
            await updateDoc(doc(db, "sos_calls", id), { status: "završeno" });
        }
    };

    // Tab Switcher
    window.switchTab = (tabId, btn) => {
        document.querySelectorAll('.list-section').forEach(sec => sec.classList.remove('active-section'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active-section');
        btn.classList.add('active');
    };
</script>
</body>
</html>
