<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | AK Balkan</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --red: #a52a2a; --dark: #061f3a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 0; }
        
        .header { background: var(--akb-blue); padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: var(--akb-blue); }

        .section { display: none; }
        .section.active { display: block; }

        /* CARDS & TABLES */
        .card { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--gold); padding: 12px; border-bottom: 1px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #1a2a3a; font-size: 0.9rem; }

        /* FORMS */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a2a3a; color: white; width: 100%; box-sizing: border-box; }
        .btn-action { background: var(--gold); color: var(--akb-blue); border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* SOS ALERTS */
        .sos-card { background: white; color: #333; padding: 20px; border-radius: 12px; border-left: 10px solid var(--red); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-dispatch { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>AK BALKAN | FOUNDER DASHBOARD</h1>
</div>

<div class="container">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="showTab('sos')">SOS MONITOR</button>
        <button class="tab-btn" onclick="showTab('partners')">PARTNERI (Šlep)</button>
        <button class="tab-btn" onclick="showTab('members')">ČLANOVI</button>
    </div>

    <div id="sos" class="section active">
        <h2 style="color:var(--red)">Aktivni SOS pozivi</h2>
        <div id="sos-list">Tražim pozive...</div>
    </div>

    <div id="partners" class="section">
        <h2>Registracija novog Partnera</h2>
        <div class="card">
            <div class="form-grid">
                <input type="text" id="p-name" placeholder="Naziv Firme / Službe">
                <input type="email" id="p-email" placeholder="Partner Email (za login)">
                <input type="text" id="p-city" placeholder="Grad / Region">
                <input type="password" id="p-pass" placeholder="Lozinka">
            </div>
            <button class="btn-action" onclick="registerPartner()">DODAJ PARTNERA</button>
        </div>
        
        <h3>Lista Partnera</h3>
        <div class="card" id="partner-list-container">
            <table>
                <thead><tr><th>Naziv</th><th>Email</th><th>Region</th><th>Status</th></tr></thead>
                <tbody id="partner-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="members" class="section">
        <h2>Baza Članova</h2>
        <div class="card">
            <table>
                <thead><tr><th>ID</th><th>Ime i Prezime</th><th>Email</th><th>Telefon</th></tr></thead>
                <tbody id="member-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Tab Logic
    window.showTab = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    };

    // SOS LIVE UPDATE
    onSnapshot(collection(db, "sos_calls"), (snap) => {
        const list = document.getElementById('sos-list');
        list.innerHTML = "";
        snap.forEach(d => {
            const call = d.data();
            if(call.status !== 'završeno') {
                const div = document.createElement('div');
                div.className = 'sos-card';
                div.innerHTML = `
                    <div>
                        <strong>${call.name}</strong> - ${call.problem}<br>
                        <small>${call.lat ? 'GPS Aktiviran' : 'Nema lokaciju'}</small>
                    </div>
                    <button class="btn-dispatch" onclick="dispatchCall('${d.id}')">
                        ${call.status === 'offen' ? 'PROSLEDI PARTNERIMA' : 'TRAŽI SE...'}
                    </button>
                `;
                list.appendChild(div);
            }
        });
    });

    window.dispatchCall = async (id) => {
        await updateDoc(doc(db, "sos_calls", id), { status: "searching" });
        alert("Poziv poslat svim šlep službama!");
    };

    // PARTNER REGISTRATION
    window.registerPartner = async () => {
        const name = document.getElementById('p-name').value;
        const email = document.getElementById('p-email').value;
        const city = document.getElementById('p-city').value;
        const pass = document.getElementById('p-pass').value;

        if(!name || !email || !pass) { alert("Popunite sva polja!"); return; }

        try {
            // Wir speichern den Partner Account in Firestore (für die login-prüfung im partnerweb)
            await setDoc(doc(db, "partners", email), {
                name, email, city, password: pass, active: true, createdAt: serverTimestamp()
            });
            alert("Partner uspešno registrovan!");
            // Felder leeren
            document.getElementById('p-name').value = "";
            document.getElementById('p-email').value = "";
            document.getElementById('p-pass').value = "";
        } catch (e) { alert("Greška: " + e.message); }
    };

    // LIST LOADERS
    onSnapshot(collection(db, "partners"), (snap) => {
        const body = document.getElementById('partner-table-body');
        body.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            body.innerHTML += `<tr><td>${p.name}</td><td>${p.email}</td><td>${p.city}</td><td style="color:green">Aktivan</td></tr>`;
        });
    });

    onSnapshot(collection(db, "users"), (snap) => {
        const body = document.getElementById('member-table-body');
        body.innerHTML = "";
        snap.forEach(d => {
            const m = d.data();
            body.innerHTML += `<tr><td>${m.customerNumber}</td><td>${m.firstName} ${m.lastName}</td><td>${m.realEmail}</td><td>${m.phone}</td></tr>`;
        });
    });

</script>
</body>
</html>
