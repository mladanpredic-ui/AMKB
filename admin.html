<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>AKB FOUNDER | Secure Login</title>
    <style>
        :root { --blue: #092e54; --gold: #c5a059; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; }
        
        /* Login Maske */
        #login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--blue); }
        .login-box { background: white; padding: 40px; border-radius: 10px; width: 300px; text-align: center; }
        
        /* Dashboard (versteckt bis Login) */
        #dashboard { display: none; }
        .sidebar { width: 250px; background: var(--blue); color: white; height: 100vh; position: fixed; padding: 20px; }
        .main { margin-left: 290px; padding: 30px; }
        
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--gold); border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <img src="logo.png" width="100" alt="AK Balkan"><br>
        <h3>Founder Login</h3>
        <input type="email" id="admin-email" placeholder="E-Mail">
        <input type="password" id="admin-password" placeholder="Passwort">
        <button id="login-btn">EINLOGGEN</button>
    </div>
</div>

<div id="dashboard">
    <div class="sidebar">
        <h2>AKB ADMIN</h2>
        <p id="user-info"></p>
        <button onclick="logout()" style="background: #a52a2a; color: white;">ABMELDEN</button>
    </div>
    <div class="main">
        <h1>Kundenverwaltung (6-stellige ID)</h1>
        <table id="user-table">
            <thead>
                <tr>
                    <th>Mitglieds-ID</th>
                    <th>Name</th>
                    <th>Kennzeichen</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmSL8TmGrcda-Btnpn0u8mUpWLo6q_aMY",
        authDomain: "autoklub-balkan.firebaseapp.com",
        projectId: "autoklub-balkan",
        storageBucket: "autoklub-balkan.firebasestorage.app",
        messagingSenderId: "499546593125",
        appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // LOGIN FUNKTION
    document.getElementById('login-btn').addEventListener('click', () => {
        const email = document.getElementById('admin-email').value;
        const pass = document.getElementById('admin-password').value;
        signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Fehler: " + err.message));
    });

    // LOGOUT FUNKTION
    window.logout = () => signOut(auth);

    // STATUS-PRÜFUNG (Wer ist angemeldet?)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('user-info').innerText = "Angemeldet als: " + user.email;
            loadData();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }
    });

    // DATEN LADEN
    function loadData() {
        onSnapshot(collection(db, "users"), (snap) => {
            const tbody = document.querySelector("#user-table tbody");
            tbody.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                tbody.innerHTML += `<tr>
                    <td><strong>${d.memberID || '---'}</strong></td>
                    <td>${d.firstName} ${d.lastName}</td>
                    <td>${d.licensePlate || '-'}</td>
                    <td>${d.status}</td>
                </tr>`;
            });
        });
    }
</script>
</body>
</html>
