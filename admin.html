<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | AK Balkan</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --dark: #061f3a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 0; }
        .header { background: var(--akb-blue); padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        #admin-content { display: none; } /* Versteckt den Admin-Bereich vor dem Login */
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a2a3a; color: white; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn-action { background: var(--gold); color: var(--akb-blue); border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: var(--akb-blue); }
        .section { display: none; } .section.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="header"><h1>AK BALKAN | FOUNDER CONTROL</h1></div>

<div class="container">
    <div id="login-area" class="card" style="max-width: 400px; margin: 50px auto;">
        <h2 style="text-align: center;">Admin Login</h2>
        <input type="email" id="admin-email" placeholder="Email">
        <input type="password" id="admin-password" placeholder="Lozinka">
        <button class="btn-action" onclick="adminLogin()">PRIJAVI SE</button>
    </div>

    <div id="admin-content">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="showTab('sos')">SOS MONITOR</button>
            <button class="tab-btn" onclick="showTab('partners')">PARTNERI</button>
            <button class="tab-btn" onclick="showTab('members')">ČLANOVI</button>
            <button onclick="adminLogout()" style="margin-left:auto; background:red; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">LOGOUT</button>
        </div>

        <div id="sos" class="section active"><h2>Aktivni SOS pozivi</h2><div id="sos-list">Tražim...</div></div>

        <div id="partners" class="section">
            <h2>Registruj Partnera</h2>
            <div class="card">
                <input type="text" id="p-name" placeholder="Naziv Firme">
                <input type="email" id="p-email" placeholder="Email">
                <input type="text" id="p-city" placeholder="Grad">
                <input type="password" id="p-pass" placeholder="Lozinka">
                <button class="btn-action" onclick="registerPartner()">DODAJ PARTNERA</button>
            </div>
            <table><thead><tr><th>Firma</th><th>Email</th><th>Grad</th></tr></thead><tbody id="partner-table"></tbody></table>
        </div>

        <div id="members" class="section">
            <h2>Baza Članova</h2>
            <table><thead><tr><th>Br. Člana</th><th>Ime</th><th>Email</th></tr></thead><tbody id="member-table"></tbody></table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCMsL8TmGrCda-Btnpn0u8mUpWLo6q_aMY",
      authDomain: "autoklub-balkan.firebaseapp.com",
      projectId: "autoklub-balkan",
      storageBucket: "autoklub-balkan.firebasestorage.app",
      messagingSenderId: "499546593125",
      appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Login Funktion
    window.adminLogin = () => {
        const e = document.getElementById('admin-email').value;
        const p = document.getElementById('admin-password').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("Greška: " + err.message));
    };

    window.adminLogout = () => signOut(auth);

    // Auth-Check: Zeige Content nur wenn Admin
    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "mladanpredic@gmail.com") {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            loadData();
        } else {
            document.getElementById('login-area').style.display = 'block';
            document.getElementById('admin-content').style.display = 'none';
        }
    });

    // Partner registrieren
    window.registerPartner = async () => {
        const name = document.getElementById('p-name').value;
        const email = document.getElementById('p-email').value;
        const pass = document.getElementById('p-pass').value;
        const city = document.getElementById('p-city').value;

        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "partners", userCred.user.uid), {
                name, email, city, role: "partner", createdAt: serverTimestamp()
            });
            alert("Partner dodat!");
        } catch (e) { alert(e.message); }
    };

    window.showTab = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    function loadData() {
        onSnapshot(collection(db, "partners"), (snap) => {
            const b = document.getElementById('partner-table'); b.innerHTML = "";
            snap.forEach(d => { const p = d.data(); b.innerHTML += `<tr><td>${p.name}</td><td>${p.email}</td><td>${p.city}</td></tr>`; });
        });
        onSnapshot(collection(db, "users"), (snap) => {
            const b = document.getElementById('member-table'); b.innerHTML = "";
            snap.forEach(d => { const m = d.data(); b.innerHTML += `<tr><td>${m.customerNumber || 'N/A'}</td><td>${m.firstName}</td><td>${m.email}</td></tr>`; });
        });
    }
</script>
</body>
</html>
