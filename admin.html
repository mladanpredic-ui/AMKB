<!DOCTYPE html>
<html>
<head>
    <title>AKB FOUNDER | CONTROL PANEL</title>
    <style>
        body { font-family: sans-serif; background: #061f3a; color: white; padding: 20px; }
        .call-card { background: white; color: #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 10px solid #a52a2a; }
        .status-badge { padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        .btn-assign { background: #092e54; color: white; padding: 10px; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>👑 AK BALKAN - GRÜNDER DASHBOARD</h1>
    <div id="admin-display">Suche nach neuen SOS-Rufen...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* DEINE CONFIG HIER */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Zeige ALLE Rufe an, egal welcher Status
        onSnapshot(collection(db, "sos_calls"), (snapshot) => {
            const display = document.getElementById('admin-display');
            display.innerHTML = "";
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const card = document.createElement('div');
                card.className = 'call-card';
                card.innerHTML = `
                    <h3>🆘 ${data.name} - ${data.problem}</h3>
                    <p>Status: <span class="status-badge">${data.status}</span></p>
                    <p>Aktueller Partner: ${data.currentTargetPartner || 'Keiner'}</p>
                    <button class="btn-assign" onclick="startSearch('${docSnap.id}')">📡 SUCHE STARTEN (Partner anfunken)</button>
                `;
                display.appendChild(card);
            });
        });

        window.startSearch = async (id) => {
            // Hier schickst du den Ruf in die "Searching" Phase
            await updateDoc(doc(db, "sos_calls", id), {
                status: "searching",
                currentTargetPartner: "partner_mladen" // Hier wird später der nächste Partner gewählt
            });
            alert("Partner wurde angefunkt!");
        };
    </script>
</body>
</html>
