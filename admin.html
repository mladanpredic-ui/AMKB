<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | AK Balkan</title>
    <style>
        :root { --akb-blue: #092e54; --gold: #c5a059; --red: #a52a2a; --dark: #061f3a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 0; }
        .header { background: var(--akb-blue); padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: var(--akb-blue); }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--gold); padding: 12px; border-bottom: 1px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #1a2a3a; font-size: 0.9rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a2a3a; color: white; width: 100%; box-sizing: border-box; }
        .btn-action { background: var(--gold); color: var(--akb-blue); border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>AK BALKAN | FOUNDER CONTROL</h1>
</div>

<div class="container">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="showTab('sos')">SOS MONITOR</button>
        <button class="tab-btn" onclick="showTab('partners')">PARTNERI (Šlep)</button>
        <button class="tab-btn" onclick="showTab('members')">ČLANOVI</button>
    </div>

    <div id="sos" class="section active">
        <h2>Aktivni SOS pozivi</h2>
        <div id="sos-list" class="card">Tražim pozive...</div>
    </div>

    <div id="partners" class="section">
        <h2>Registruj novu Šlep Službu</h2>
        <div class="card">
            <div class="form-grid">
                <input type="text" id="p-name" placeholder="Naziv Firme">
                <input type="email" id="p-email" placeholder="Email">
                <input type="text" id="p-city" placeholder="Grad">
                <input type="password" id="p-pass" placeholder="Lozinka">
            </div>
            <button class="btn-action" onclick="registerPartner()">KREIRAJ PARTNER NALOG</button>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>Firma</th><th>Email</th><th>Grad</th></tr></thead>
                <tbody id="partner-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="members" class="section">
        <h2>Baza Članova</h2>
        <div class="card">
            <table>
                <thead><tr><th>Br. Člana</th><th>Ime</th><th>Email</th></tr></thead>
                <tbody id="member-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCMsL8TmGrCda-Btnpn0u8mUpWLo6q_aMY",
      authDomain: "autoklub-balkan.firebaseapp.com",
      projectId: "autoklub-balkan",
      storageBucket: "autoklub-balkan.firebasestorage.app",
      messagingSenderId: "499546593125",
      appId: "1:499546593125:web:7823602797b37e8338b38c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // WICHTIG: Funktionen an 'window' binden, damit onclick im HTML funktioniert
    window.showTab = (tabId) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    };

    window.registerPartner = async () => {
        const name = document.getElementById('p-name').value;
        const email = document.getElementById('p-email').value;
        const city = document.getElementById('p-city').value;
        const pass = document.getElementById('p-pass').value;

        if(!name || !email || !pass) return alert("Popunite sva polja!");

        try {
            await setDoc(doc(db, "partners", email), {
                name, email, city, password: pass, role: "partner", active: true, createdAt: serverTimestamp()
            });
            alert("Partner uspešno registrovan!");
            document.querySelectorAll('input').forEach(i => i.value = "");
        } catch (e) {
            alert("Greška: " + e.message);
        }
    };

    // Daten in Echtzeit laden
    onSnapshot(collection(db, "partners"), (snap) => {
        const body = document.getElementById('partner-table-body');
        body.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            body.innerHTML += `<tr><td>${p.name}</td><td>${p.email}</td><td>${p.city}</td></tr>`;
        });
    });

    onSnapshot(collection(db, "users"), (snap) => {
        const body = document.getElementById('member-table-body');
        body.innerHTML = "";
        snap.forEach(d => {
            const m = d.data();
            body.innerHTML += `<tr><td>${m.customerNumber || 'N/A'}</td><td>${m.firstName} ${m.lastName}</td><td>${m.email}</td></tr>`;
        });
    });
</script>
</body>
</html>
